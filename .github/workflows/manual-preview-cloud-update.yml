name: Preview Cloud PR Update

on:
  repository_dispatch:
    types: [preview-cloud-update]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Comment build progress on PR
        run: |
          BODY="🔄 Your preview cloud environment is being updated. You can view the progress at [this link](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          curl -X POST \
            -H "Authorization: token ${{ secrets.PACKAGES_KEY }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/teableio/teable-ee/issues/${{ github.event.client_payload.pr_number }}/comments" \
            -d "{\"body\":\"${BODY}\"}"

  build-push:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      pr_number: ${{ github.event.client_payload.pr_number }}
      ref: ${{ github.event.client_payload.ref }}
      main_commit_sha: ${{ steps.get_sha.outputs.sha }}
      main_commit_author: ${{ steps.get_commit_info.outputs.author }}
    strategy:
      matrix:
        include:
          - image: teable-cloud-preview
            file: Dockerfile
          - image: teable-sandbox-cloud-preview
            file: Dockerfile.sandbox
    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}
          submodules: "true"
          ref: ${{ github.event.client_payload.ref }}

      - name: Get teable-ee SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: get_commit_info
        run: |
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT

      - name: Login to Ali container registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shenzhen.aliyuncs.com
          username: ${{ vars.ALI_DOCKER_USERNAME }}
          password: ${{ secrets.ALI_DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
      - name: ⚙️ Install zx
        run: npm install -g zx

      - name: ⚙️ Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            registry.cn-shenzhen.aliyuncs.com/teable/${{ matrix.image }}
            ghcr.io/teableio/${{ matrix.image }}
            649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/${{ matrix.image }}
          tags: |
            type=raw,value=alpha-pr-${{ github.event.client_payload.pr_number }}
            type=raw,value=${{ steps.get_sha.outputs.sha }}
      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: ⚙️ Expose GitHub runtime for Buildx cache
        uses: crazy-max/ghaction-github-runtime@v3

      - name: 📦 Build and push
        run: |
          zx scripts/build-image.mjs --file=dockers/teable/${{ matrix.file }} \
              --build-arg="ENABLE_CSP=false" \
              --build-arg="NEXT_BUILD_ENV_EDITION=CLOUD" \
              --tag="${{ steps.meta.outputs.tags }}" \
              --platform="linux/amd64" \
              --push

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    env:
      NAMESPACE: 38puz7wo
      INSTANCE_NAME: pr-cloud-${{ github.event.client_payload.pr_number }}
      INSTANCE_DOMAIN: pr-cloud-${{ github.event.client_payload.pr_number }}
      DISPLAY_NAME: "teable-pr-cloud-${{ github.event.client_payload.pr_number }}"
    steps:
      - name: Check if deployment exists
        id: check_deploy
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        continue-on-error: true
        with:
          args: get deployment/teable-${{ env.INSTANCE_NAME }} --no-headers

      - name: Check tracing label
        id: labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGES_KEY }}
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: 'teableio',
              repo: 'teable-ee',
              pull_number: Number(context.payload.client_payload.pr_number),
            });
            const labels = pullRequest.labels.map((label) => label.name);
            const enableTracing = labels.includes('tracing');
            core.setOutput('enable_tracing', String(enableTracing));
            console.log('PR labels:', labels.join(', '));
            console.log('Enable tracing:', enableTracing);

      # --- Fallback: full create if deployment does not exist ---
      - name: Checkout repository (fallback create)
        if: steps.check_deploy.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Create deployment YAML (fallback create)
        if: steps.check_deploy.outcome == 'failure'
        env:
          MAIN_IMAGE_REPOSITORY: registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud-preview
          SANDBOX_IMAGE_REPOSITORY: registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-cloud-preview
          IMAGE_TAG: ${{ needs.build-push.outputs.main_commit_sha }}
          ENABLE_TRACING: ${{ steps.labels.outputs.enable_tracing }}
        run: |
          if [ "${ENABLE_TRACING}" = "true" ]; then
            OTEL_EXPORTER_OTLP_ENDPOINT="http://teable-${{ env.INSTANCE_NAME }}-jaeger:4318/v1/traces"
            TRACE_LINK_BASE_URL="https://jaeger-${{ env.INSTANCE_DOMAIN }}.sealoshzh.site"
          else
            OTEL_EXPORTER_OTLP_ENDPOINT=""
            TRACE_LINK_BASE_URL=""
          fi

          cp .github/workflows/templates/preview-template.yaml deploy.yaml
          sed -i "s#__NAMESPACE__#${{ env.NAMESPACE }}#g" deploy.yaml
          sed -i "s#__INSTANCE_NAME__#${{ env.INSTANCE_NAME }}#g" deploy.yaml
          sed -i "s#__INSTANCE_DOMAIN__#${{ env.INSTANCE_DOMAIN }}#g" deploy.yaml
          sed -i "s#__MAIN_IMAGE_REPOSITORY__#${{ env.MAIN_IMAGE_REPOSITORY }}#g" deploy.yaml
          sed -i "s#__SANDBOX_IMAGE_REPOSITORY__#${{ env.SANDBOX_IMAGE_REPOSITORY }}#g" deploy.yaml
          sed -i "s#__IMAGE_TAG__#${{ env.IMAGE_TAG }}#g" deploy.yaml
          sed -i "s#__DISPLAY_NAME__#${{ env.DISPLAY_NAME }}#g" deploy.yaml
          sed -i "s#__OTEL_EXPORTER_OTLP_ENDPOINT__#${OTEL_EXPORTER_OTLP_ENDPOINT}#g" deploy.yaml
          sed -i "s#__TRACE_LINK_BASE_URL__#${TRACE_LINK_BASE_URL}#g" deploy.yaml

          if [ "${ENABLE_TRACING}" = "true" ]; then
            sed -i '/^#__JAEGER_ENABLED_/d' deploy.yaml
          else
            sed -i '/^#__JAEGER_ENABLED_START__$/, /^#__JAEGER_ENABLED_END__$/d' deploy.yaml
          fi

      - name: Apply deploy job (fallback create)
        if: steps.check_deploy.outcome == 'failure'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: apply -f deploy.yaml

      # --- Normal update path if deployment exists ---
      - name: Update sandbox deployment image
        if: steps.check_deploy.outcome == 'success'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          SANDBOX_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-cloud-preview:${{ needs.build-push.outputs.main_commit_sha }}
        with:
          args: set image deployment/teable-${{ env.INSTANCE_NAME }}-sandbox teable-${{ env.INSTANCE_NAME }}-sandbox=${{ env.SANDBOX_IMAGE }}

      - name: Update sandbox deployment annotations
        if: steps.check_deploy.outcome == 'success'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          SANDBOX_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-cloud-preview:${{ needs.build-push.outputs.main_commit_sha }}
        with:
          args: annotate deployment/teable-${{ env.INSTANCE_NAME }}-sandbox originImageName="${{ env.SANDBOX_IMAGE }}" --overwrite

      - name: Update main deployment image (container + init container)
        if: steps.check_deploy.outcome == 'success'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          MAIN_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud-preview:${{ needs.build-push.outputs.main_commit_sha }}
        with:
          args: set image deployment/teable-${{ env.INSTANCE_NAME }} teable-${{ env.INSTANCE_NAME }}=${{ env.MAIN_IMAGE }} db-migrate=${{ env.MAIN_IMAGE }}

      - name: Update main deployment annotations
        if: steps.check_deploy.outcome == 'success'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          MAIN_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud-preview:${{ needs.build-push.outputs.main_commit_sha }}
        with:
          args: annotate deployment/teable-${{ env.INSTANCE_NAME }} originImageName="${{ env.MAIN_IMAGE }}" --overwrite

      - name: Manage Jaeger tracing
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          ENABLE_TRACING: ${{ steps.labels.outputs.enable_tracing }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" | base64 -d > ~/.kube/config

          if [ "${ENABLE_TRACING}" = "true" ]; then
            OTEL_ENDPOINT="http://teable-${{ env.INSTANCE_NAME }}-jaeger:4318/v1/traces"
            TRACE_URL="https://jaeger-${{ env.INSTANCE_DOMAIN }}.sealoshzh.site"

            kubectl -n ns-${{ env.NAMESPACE }} set env deployment/teable-${{ env.INSTANCE_NAME }} \
              OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_ENDPOINT}" \
              TRACE_LINK_BASE_URL="${TRACE_URL}"

            kubectl -n ns-${{ env.NAMESPACE }} apply -f - <<'JAEGER_EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: teable-${{ env.INSTANCE_NAME }}-jaeger
            namespace: ns-${{ env.NAMESPACE }}
            annotations:
              deploy.cloud.sealos.io/minReplicas: '1'
              deploy.cloud.sealos.io/maxReplicas: '1'
            labels:
              cloud.sealos.io/app-deploy-manager: teable-${{ env.INSTANCE_NAME }}-jaeger
              app: teable-${{ env.INSTANCE_NAME }}-jaeger
              cloud.sealos.io/deploy-on-sealos: teable-${{ env.INSTANCE_NAME }}
          spec:
            replicas: 1
            revisionHistoryLimit: 1
            selector:
              matchLabels:
                app: teable-${{ env.INSTANCE_NAME }}-jaeger
            template:
              metadata:
                labels:
                  app: teable-${{ env.INSTANCE_NAME }}-jaeger
              spec:
                terminationGracePeriodSeconds: 10
                automountServiceAccountToken: false
                containers:
                  - name: teable-${{ env.INSTANCE_NAME }}-jaeger
                    image: jaegertracing/jaeger:2.16.0
                    args:
                      - '--set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318'
                      - '--set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317'
                    resources:
                      requests:
                        cpu: 200m
                        memory: 256Mi
                      limits:
                        cpu: 1000m
                        memory: 1024Mi
                    ports:
                      - name: ui
                        containerPort: 16686
                      - name: otlp-grpc
                        containerPort: 4317
                      - name: otlp-http
                        containerPort: 4318
                    imagePullPolicy: IfNotPresent
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: teable-${{ env.INSTANCE_NAME }}-jaeger
            namespace: ns-${{ env.NAMESPACE }}
            labels:
              cloud.sealos.io/app-deploy-manager: teable-${{ env.INSTANCE_NAME }}-jaeger
              cloud.sealos.io/deploy-on-sealos: teable-${{ env.INSTANCE_NAME }}
          spec:
            ports:
              - name: ui
                port: 16686
                targetPort: 16686
                protocol: TCP
              - name: otlp-grpc
                port: 4317
                targetPort: 4317
                protocol: TCP
              - name: otlp-http
                port: 4318
                targetPort: 4318
                protocol: TCP
            selector:
              app: teable-${{ env.INSTANCE_NAME }}-jaeger
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: teable-${{ env.INSTANCE_NAME }}-jaeger
            namespace: ns-${{ env.NAMESPACE }}
            labels:
              cloud.sealos.io/app-deploy-manager: teable-${{ env.INSTANCE_NAME }}-jaeger
              cloud.sealos.io/app-deploy-manager-domain: jaeger-${{ env.INSTANCE_DOMAIN }}
              cloud.sealos.io/deploy-on-sealos: teable-${{ env.INSTANCE_NAME }}
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: 16m
          spec:
            ingressClassName: nginx
            rules:
              - host: jaeger-${{ env.INSTANCE_DOMAIN }}.sealoshzh.site
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: teable-${{ env.INSTANCE_NAME }}-jaeger
                          port:
                            number: 16686
            tls:
              - hosts:
                  - jaeger-${{ env.INSTANCE_DOMAIN }}.sealoshzh.site
                secretName: wildcard-apps-cert
          JAEGER_EOF
          else
            kubectl -n ns-${{ env.NAMESPACE }} set env deployment/teable-${{ env.INSTANCE_NAME }} \
              OTEL_EXPORTER_OTLP_ENDPOINT="" \
              TRACE_LINK_BASE_URL=""

            kubectl -n ns-${{ env.NAMESPACE }} delete deployment,service,ingress \
              teable-${{ env.INSTANCE_NAME }}-jaeger --ignore-not-found=true
          fi

          rm -f ~/.kube/config

      - name: Rollout sandbox status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }}-sandbox --timeout=300s

      - name: Rollout main status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }} --timeout=300s

      - name: Rollout Jaeger status
        if: steps.labels.outputs.enable_tracing == 'true'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }}-jaeger --timeout=300s

      - name: Wait for application health check
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: exec deployment/teable-${{ env.INSTANCE_NAME }} -- curl -f --retry 30 --retry-delay 5 --retry-connrefused http://localhost:3000/health

      - name: Create deployment status comment
        if: always()
        run: |
          SUCCESS="${{ job.status == 'success' }}"
          DOMAIN="pr-cloud-${{ github.event.client_payload.pr_number }}"
          URL="https://${DOMAIN}.sealoshzh.site"
          TRACING_ENABLED="${{ steps.labels.outputs.enable_tracing }}"
          JAEGER_URL="https://jaeger-${DOMAIN}.sealoshzh.site"

          if [ "$SUCCESS" = "true" ]; then
            STATUS="✅ Success"
            BODY="**Deployment Status: ${STATUS}** 🔗 Preview URL: ${URL}"
            if [ "$TRACING_ENABLED" = "true" ]; then
              BODY="${BODY} 🔎 Jaeger URL: ${JAEGER_URL}"
            fi
          else
            STATUS="❌ Failed"
            BODY="**Deployment Status: ${STATUS}**"
          fi

          curl -X POST \
            -H "Authorization: token ${{ secrets.PACKAGES_KEY }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/teableio/teable-ee/issues/${{ github.event.client_payload.pr_number }}/comments" \
            -d "{\"body\":\"${BODY}\"}"
