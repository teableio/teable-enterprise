# EE Remote CI — lint suite (mirrors teable-ee "Linting and Types").
# One workflow per suite so partial reruns produce clean run pages with no
# skipped-job noise. See ee-remote-ci-integration.yaml header (or the README
# in teable-ee .github/enterprise-ci/) for the architecture and privacy
# contract; SOURCE OF TRUTH lives in teable-ee and is synced here.

name: EE Remote CI (lint)

run-name: 'EE Remote CI lint — PR #${{ github.event.client_payload.pr_number }} ${{ github.event.client_payload.log_tag }}'

on:
  repository_dispatch:
    types: [ee-remote-ci-lint]

concurrency:
  group: ee-remote-ci-lint-${{ github.event.client_payload.pr_number || github.event.client_payload.ee_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Verdict jobs read this run's own job timings for the check-run summary.
  actions: read

env:
  EE_SHA: ${{ github.event.client_payload.ee_sha }}
  LOG_TAG: ${{ github.event.client_payload.log_tag }}
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  LOG_DIR: /tmp/ci-logs
  LOGS_REPO: teableio/teable-ci-logs

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    timeout-minutes: 25

    env:
      NODE_OPTIONS: '--max-old-space-size=8192'
      TEABLE_TSDOWN_DISABLE_DTS: '1'

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: 🧩 Generate Prisma Client
        working-directory: packages/db-main-prisma
        run: |
          mkdir -p "$LOG_DIR"
          status=0
          {
            echo "=== prisma generate ==="
            pnpm -F @teable/db-main-prisma-ee prisma-generate --schema ./prisma/postgres/schema.prisma
          } >> "$LOG_DIR/lint-typecheck.log" 2>&1 || status=$?
          echo "prisma generate exit=$status ($(wc -l < "$LOG_DIR/lint-typecheck.log") log lines)"
          exit $status

      - name: 🏗 Build typecheck dependencies
        run: |
          status=0
          {
            echo "=== build typecheck deps ==="
            pnpm -r --filter "./community/packages/**" --sort --workspace-concurrency=4 run build &&
            pnpm -r --filter "./packages/**" --sort --workspace-concurrency=4 run build
          } >> "$LOG_DIR/lint-typecheck.log" 2>&1 || status=$?
          echo "deps build exit=$status ($(wc -l < "$LOG_DIR/lint-typecheck.log") log lines)"
          exit $status

      - name: 🕵️ Typecheck
        run: |
          # The three scopes are independent tsc invocations — run them in
          # parallel (16GB comfortably fits them; heap cap is per-process).
          pnpm g:typecheck > "$LOG_DIR/tc-root.log" 2>&1 & p1=$!
          pnpm g:typecheck:community > "$LOG_DIR/tc-community.log" 2>&1 & p2=$!
          pnpm g:typecheck:community:backend > "$LOG_DIR/tc-backend.log" 2>&1 & p3=$!
          status=0
          wait $p1 || status=1
          wait $p2 || status=1
          wait $p3 || status=1
          for part in root community backend; do
            { echo "=== typecheck ($part) ==="; cat "$LOG_DIR/tc-$part.log"; } >> "$LOG_DIR/lint-typecheck.log"
          done
          echo "typecheck exit=$status ($(wc -l < "$LOG_DIR/lint-typecheck.log") log lines total)"
          exit $status

      - name: 📤 Ship log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p "$LOG_DIR"
          [ -f "$LOG_DIR/lint-typecheck.log" ] || echo "(no log produced — job failed before its first logged step)" > "$LOG_DIR/lint-typecheck.log"
          gh release create "$LOG_TAG" -R "$LOGS_REPO" --title "EE Remote CI $LOG_TAG (PR #$PR_NUMBER)" --notes "ee_sha=$EE_SHA run=$RUN_URL" 2>/dev/null || true
          gh release upload "$LOG_TAG" "$LOG_DIR/lint-typecheck.log" -R "$LOGS_REPO" --clobber
          # Failure marker — the conclude step tails only marked logs instead
          # of guessing from log text (which false-positived on ERROR noise).
          if [ "$JOB_STATUS" != "success" ]; then
            echo failed > "$LOG_DIR/lint-typecheck.failed"
            gh release upload "$LOG_TAG" "$LOG_DIR/lint-typecheck.failed" -R "$LOGS_REPO" --clobber
          fi

  lint:
    runs-on: ubuntu-latest
    name: Lint
    timeout-minutes: 20

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      # Community db-main-prisma imports named exports from @prisma/client,
      # which only exist after generation; without this the import/export lint rule fails.
      - name: 🧩 Generate Prisma Client
        run: |
          mkdir -p "$LOG_DIR"
          status=0
          {
            echo "=== prisma generate (community) ==="
            pnpm -F @teable/db-main-prisma prisma-generate-ci
          } >> "$LOG_DIR/lint-eslint.log" 2>&1 || status=$?
          echo "prisma generate exit=$status ($(wc -l < "$LOG_DIR/lint-eslint.log") log lines)"
          exit $status

      - name: 🏗 Build community lint dependencies
        run: |
          status=0
          {
            echo "=== build plugin deps ==="
            pnpm -r --filter "@teable/plugin^..." --sort --workspace-concurrency=4 run build
          } >> "$LOG_DIR/lint-eslint.log" 2>&1 || status=$?
          echo "deps build exit=$status ($(wc -l < "$LOG_DIR/lint-eslint.log") log lines)"
          exit $status

      - name: 🔬 Linter
        run: |
          # The four lint scopes are independent — run them in parallel.
          pnpm g:lint > "$LOG_DIR/li-ee.log" 2>&1 & p1=$!
          pnpm g:lint:community > "$LOG_DIR/li-community.log" 2>&1 & p2=$!
          pnpm g:lint-styles > "$LOG_DIR/li-styles-ee.log" 2>&1 & p3=$!
          pnpm g:lint-styles:community > "$LOG_DIR/li-styles-community.log" 2>&1 & p4=$!
          status=0
          wait $p1 || status=1
          wait $p2 || status=1
          wait $p3 || status=1
          wait $p4 || status=1
          for part in ee community styles-ee styles-community; do
            { echo "=== lint ($part) ==="; cat "$LOG_DIR/li-$part.log"; } >> "$LOG_DIR/lint-eslint.log"
          done
          echo "lint exit=$status ($(wc -l < "$LOG_DIR/lint-eslint.log") log lines total)"
          exit $status

      - name: 📤 Ship log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p "$LOG_DIR"
          [ -f "$LOG_DIR/lint-eslint.log" ] || echo "(no log produced — job failed before its first logged step)" > "$LOG_DIR/lint-eslint.log"
          gh release create "$LOG_TAG" -R "$LOGS_REPO" --title "EE Remote CI $LOG_TAG (PR #$PR_NUMBER)" --notes "ee_sha=$EE_SHA run=$RUN_URL" 2>/dev/null || true
          gh release upload "$LOG_TAG" "$LOG_DIR/lint-eslint.log" -R "$LOGS_REPO" --clobber
          # Failure marker — the conclude step tails only marked logs instead
          # of guessing from log text (which false-positived on ERROR noise).
          if [ "$JOB_STATUS" != "success" ]; then
            echo failed > "$LOG_DIR/lint-eslint.failed"
            gh release upload "$LOG_TAG" "$LOG_DIR/lint-eslint.failed" -R "$LOGS_REPO" --clobber
          fi

  verdict:
    needs: [typecheck, lint]
    if: always()
    runs-on: ubuntu-latest
    name: Lint verdict
    timeout-minutes: 5
    steps:
      - name: 📦 Checkout teable-ee (.github only)
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false
          sparse-checkout: |
            .github

      - name: 🎫 Mint App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RCI_APP_ID }}
          private-key: ${{ secrets.RCI_APP_PRIVATE_KEY }}
          owner: teableio
          repositories: teable-ee

      - name: 🧾 Conclude check run
        uses: ./.github/actions/remote-ci-conclude
        with:
          suite: lint
          results: 'typecheck=${{ needs.typecheck.result }} lint=${{ needs.lint.result }}'
          app-token: ${{ steps.app.outputs.token }}
          logs-token: ${{ secrets.PACKAGES_KEY }}

      - name: 📨 Dispatch ee-remote-ci-done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
        run: |
          gh api repos/teableio/teable-ee/dispatches \
            -f event_type=ee-remote-ci-done \
            -f "client_payload[suite]=lint" \
            -f "client_payload[pr_number]=${PR_NUMBER}" \
            -f "client_payload[ee_sha]=${EE_SHA}" \
            -f "client_payload[log_tag]=${LOG_TAG}" \
            -f "client_payload[remote_run_url]=${RUN_URL}" \
            -f "client_payload[check_run_id]=${{ github.event.client_payload.check_run_id }}" \
            -f "client_payload[results]=typecheck=${{ needs.typecheck.result }} lint=${{ needs.lint.result }}"
