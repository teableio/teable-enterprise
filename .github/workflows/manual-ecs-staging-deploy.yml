name: Manual ECS Staging Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., 0.3.0-alpha-1.9.0-build.302-amd64)'
        required: true
      trigger:
        description: 'Who triggered this deployment'
        required: false
        default: 'Manual'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        default: ''
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      trigger:
        description: 'Who triggered this deployment'
        required: false
        type: string
        default: 'Automation'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        type: string
        default: ''
    outputs:
      start_time:
        description: 'Deployment start timestamp'
        value: ${{ jobs.prepare.outputs.start_time }}
      image_tag:
        description: 'Deployed image tag'
        value: ${{ jobs.prepare.outputs.image_tag }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      TEABLE_API_TOKEN:
        required: false

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      image_tag: ${{ inputs.image_tag }}

    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

  deploy-sandbox:
    name: Deploy Sandbox to Staging ECS
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download sandbox task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable-sandbox-staging \
            --query taskDefinition > sandbox-task-definition-raw.json

      - name: Clean sandbox task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            sandbox-task-definition-raw.json > sandbox-task-definition.json

      - name: Render sandbox task definition with new image
        id: render-sandbox-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: sandbox-task-definition.json
          container-name: sandbox
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-sandbox-cloud:${{ inputs.image_tag }}

      - name: Deploy sandbox to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-sandbox-task-def.outputs.task-definition }}
          service: teable-sandbox-service
          cluster: teable-staging
          wait-for-service-stability: true

  deploy-app:
    name: Deploy Main to Staging ECS
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable-staging \
            --query taskDefinition > task-definition-raw.json

      - name: Clean task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            task-definition-raw.json > task-definition.json

      - name: Render task definition with new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: teable
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-cloud:${{ inputs.image_tag }}

      - name: Run database migration as one-off task
        run: |
          # Get network config from the service for RunTask
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster teable-staging \
            --services teable-staging-service \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Register a temporary task definition with the new image for migration
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migration with task definition: $TASK_DEF_ARN"

          # Run migration as a one-off task with command override
          TASK_ARN=$(aws ecs run-task \
            --cluster teable-staging \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "teable",
                "command": ["migrate-only"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task started: $TASK_ARN"

          # Wait for migration task to complete
          echo "Waiting for migration to complete..."
          aws ecs wait tasks-stopped --cluster teable-staging --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster teable-staging \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`teable`].exitCode | [0]' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            # Print migration task logs for debugging
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /ecs/teable \
              --log-stream-name "ecs/teable/$TASK_ID" \
              --limit 50 \
              --query 'events[*].message' \
              --output text 2>/dev/null || true
            exit 1
          fi

          echo "Database migration completed successfully"

      - name: Update task definition with skip-migrate command
        run: |
          # Add skip-migrate command to the main container and remove the db-migrate init container if present
          jq '(.containerDefinitions[] | select(.name == "teable")).command = ["skip-migrate"]
              | .containerDefinitions = [.containerDefinitions[] | select(.name != "db-migrate")]
              | (.containerDefinitions[] | select(.name == "teable")) |= del(.dependsOn)' \
            "${{ steps.render-task-def.outputs.task-definition }}" > task-definition-skip-migrate.json

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition-skip-migrate.json
          service: teable-staging-service
          cluster: teable-staging
          wait-for-service-stability: true

  notify:
    name: Record Deployment in Teable
    needs: [prepare, deploy-sandbox, deploy-app]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Update Staging Status in Releases table
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_RESULT: ${{ (needs.deploy-app.result == 'success' && needs.deploy-sandbox.result == 'success') && 'Deployed' || 'Failed' }}
        run: |
          # Strip -amd64 suffix to get the Release Tag
          RELEASE_TAG="${IMAGE_TAG%-amd64}"
          echo "Looking up Release with Tag: $RELEASE_TAG"

          # Search for the release record by Tag field
          encoded_tag=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$RELEASE_TAG'))")
          http_code=$(curl -s -w "%{http_code}" -o /tmp/search.json \
            "https://app.teable.ai/api/table/tblAhVLOxNtvkaF1ii5/record?fieldKeyType=id&search%5B0%5D=${encoded_tag}&search%5B1%5D=fldY6yzWtcA6IBcSRus&take=1" \
            -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}')

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::warning::Failed to search for release record (HTTP $http_code)"
            cat /tmp/search.json
          else
            record_id=$(jq -r '.records[0].id // empty' /tmp/search.json)
            if [ -n "$record_id" ]; then
              echo "Found release record: $record_id, updating Staging Status to $DEPLOY_RESULT"
              update_payload=$(jq -n \
                --arg status "$DEPLOY_RESULT" \
                '{
                  "fieldKeyType": "id",
                  "typecast": true,
                  "record": {
                    "fields": {
                      "fldDTDMmcyJ7jmn6YsH": $status
                    }
                  }
                }')
              curl -s -o /dev/null -w "Update HTTP %{http_code}\n" -X PATCH \
                "https://app.teable.ai/api/table/tblAhVLOxNtvkaF1ii5/record/${record_id}" \
                -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}' \
                -H 'Content-Type: application/json' \
                -d "$update_payload"
            else
              echo "::warning::No release record found for tag: $RELEASE_TAG"
            fi
          fi

      - name: Send Feishu staging deploy notification
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          TRIGGER: ${{ inputs.trigger || github.actor }}
          DEPLOY_SUCCESS: ${{ (needs.deploy-app.result == 'success' && needs.deploy-sandbox.result == 'success') && 'true' || 'false' }}
        run: |
          RELEASE_TAG="${IMAGE_TAG%-amd64}"

          # Fetch release record with issue titles and author
          encoded_tag=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$RELEASE_TAG'))")
          curl -s -o /tmp/release.json \
            "https://app.teable.ai/api/table/tblAhVLOxNtvkaF1ii5/record?fieldKeyType=id&search%5B0%5D=${encoded_tag}&search%5B1%5D=fldY6yzWtcA6IBcSRus&take=1" \
            -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}'

          # Extract fields from release record
          AUTHOR=$(jq -r '.records[0].fields.fldJ4qG0qPsJyQH2emY // "未知"' /tmp/release.json 2>/dev/null || echo "未知")
          ISSUE_TITLES=$(jq -r '[.records[0].fields.fldtLzqnpEVjdmcRLNg // [] | .[]?] | if length == 0 then "无关联 Issue" else to_entries | map("• \(.value)") | join("\n") end' /tmp/release.json 2>/dev/null || echo "无关联 Issue")
          PR=$(jq -r '.records[0].fields.fldCBYic8BUuwyeHFo5 // "无"' /tmp/release.json 2>/dev/null || echo "无")

          # Determine card color and title
          if [ "$DEPLOY_SUCCESS" = "true" ]; then
            HEADER_COLOR="yellow"
            TITLE="🚀 Staging 部署成功 ${RELEASE_TAG}"
          else
            HEADER_COLOR="red"
            TITLE="❌ Staging 部署失败 ${RELEASE_TAG}"
          fi

          # Build Feishu card
          card_payload=$(jq -n \
            --arg title "$TITLE" \
            --arg color "$HEADER_COLOR" \
            --arg tag "$RELEASE_TAG" \
            --arg author "$AUTHOR" \
            --arg pr "$PR" \
            --arg issues "$ISSUE_TITLES" \
            '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": $title },
                  "template": $color
                },
                "elements": [
                  {
                    "tag": "div",
                    "fields": [
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**Tag**\n" + $tag) } },
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**Author**\n" + $author) } },
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**PR**\n" + $pr) } }
                    ]
                  },
                  { "tag": "hr" },
                  {
                    "tag": "div",
                    "text": { "tag": "lark_md", "content": ("**📋 关联 Issue：**\n" + $issues) }
                  }
                ]
              }
            }')

          # Send to Feishu
          http_code=$(curl -s -w "%{http_code}" -o /tmp/feishu.json -X POST \
            'https://open.feishu.cn/open-apis/bot/v2/hook/66b6ebf2-9bbd-4e41-b629-4062a6be4a42' \
            -H 'Content-Type: application/json' \
            -d "$card_payload")

          echo "Feishu notification HTTP: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::warning::Feishu notification failed"
            cat /tmp/feishu.json
          fi
