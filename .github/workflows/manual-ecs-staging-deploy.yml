name: Manual ECS Staging Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., release.2026-04-20T10-38-57Z.1)'
        required: true
      trigger:
        description: 'Who triggered this deployment'
        required: false
        default: 'Manual'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        default: ''
      release_record_id:
        description: 'Teable Release record ID for status update'
        required: false
        default: ''
      release_author:
        description: 'Release author'
        required: false
        default: ''
      release_pr:
        description: 'Pull request number'
        required: false
        default: ''
      release_issues:
        description: 'Related issue titles (newline separated)'
        required: false
        default: ''
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      trigger:
        description: 'Who triggered this deployment'
        required: false
        type: string
        default: 'Automation'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        type: string
        default: ''
      release_record_id:
        description: 'Teable Release record ID for status update'
        required: false
        type: string
        default: ''
      release_author:
        description: 'Release author'
        required: false
        type: string
        default: ''
      release_pr:
        description: 'Pull request number'
        required: false
        type: string
        default: ''
      release_issues:
        description: 'Related issue titles (newline separated)'
        required: false
        type: string
        default: ''
    outputs:
      start_time:
        description: 'Deployment start timestamp'
        value: ${{ jobs.prepare.outputs.start_time }}
      image_tag:
        description: 'Deployed image tag'
        value: ${{ jobs.prepare.outputs.image_tag }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      TEABLE_API_TOKEN:
        required: false

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      image_tag: ${{ inputs.image_tag }}
      staging_tag: ${{ steps.resolve.outputs.staging_tag }}

    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Resolve staging registry tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          # Records and automation identify a build by its release id
          # (release.<ts>.<seq>); the registry tag of a staging build is the
          # derived beta-<ts>.<seq> twin. Builds from before the channel
          # split were pushed as release.* directly, so fall back to the
          # input tag when the beta twin is absent on ECR.
          case "$INPUT_TAG" in
            release.*) CANDIDATE="beta-${INPUT_TAG#release.}" ;;
            *)         CANDIDATE="$INPUT_TAG" ;;
          esac
          if aws ecr describe-images --region us-west-2 \
               --repository-name teable/teable-cloud \
               --image-ids imageTag="$CANDIDATE" >/dev/null 2>&1; then
            STAGING_TAG="$CANDIDATE"
          else
            echo "beta twin ${CANDIDATE} not on ECR, falling back to ${INPUT_TAG}"
            STAGING_TAG="$INPUT_TAG"
          fi
          echo "staging_tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying registry tag: ${STAGING_TAG}"

  # Staging rehearsal of the CDN release flow: patch the staging image with
  # the CDN origin (.github/scripts/patch-asset-prefix.mjs, bind-mounted into
  # the build — nothing baked into product images), upload the patched static
  # set to the assets bucket, invalidate the CDN edge, and push the patched
  # image back under the SAME staging tag — the deploy flow keeps referencing
  # beta-<id> exactly as before; the patch is invisible to everything
  # downstream. Idempotency comes from the teable.asset-prefix image label,
  # not from tag names. ECR-only (this workflow has no ghcr credentials),
  # which means the in-place push makes ECR's beta-<id> diverge from ghcr's —
  # ghcr stays the authoritative UNPATCHED artifact, and the production
  # stamp-release sources release tags from ghcr for that reason. Assets
  # share the production bucket: keys are content-hashed per build so nothing
  # referenced by a released build is ever touched, and the upload is
  # append-only (never --delete). Images whose bundle format the script does
  # not recognize are deployed untouched.
  patch-cdn:
    name: Patch staging image for CDN
    needs: prepare
    runs-on: ubuntu-latest
    env:
      STAGING_TAG: ${{ needs.prepare.outputs.staging_tag }}
      CDN_ORIGIN: https://sss.teable.ai
      ASSET_BUCKET: teable-next-asset
      CLOUDFRONT_DISTRIBUTION_ID: E3PW5TFEINWLOJ
      ECR_IMAGE: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-cloud

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if the staging image is already patched (redeploy fast-path)
        id: existing
        run: |
          set -euo pipefail
          docker pull "${ECR_IMAGE}:${STAGING_TAG}"
          CURRENT=$(docker inspect --format '{{index .Config.Labels "teable.asset-prefix"}}' \
            "${ECR_IMAGE}:${STAGING_TAG}" 2>/dev/null || echo "")
          if [ "$CURRENT" = "$CDN_ORIGIN" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${STAGING_TAG} already carries the ${CDN_ORIGIN} patch; assets are append-only, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout deploy scripts
        if: steps.existing.outputs.exists == 'false'
        uses: actions/checkout@v4

      - name: Build patch layer
        if: steps.existing.outputs.exists == 'false'
        id: patch
        run: |
          set -euo pipefail

          # Pre-flight dry-run with the mounted script: an image whose bundle
          # format the script does not recognize (pre-Turbopack build, or a
          # Next upgrade whose pattern is not in the list yet — see the
          # verify-cdn-patchability canary) is deployed untouched instead of
          # blocking the staging deploy.
          if ! docker run --rm --entrypoint node -e PATCH_DRY_RUN=1 \
              -v "$PWD/.github/scripts/patch-asset-prefix.mjs:/tmp/patch-asset-prefix.mjs:ro" \
              "${ECR_IMAGE}:${STAGING_TAG}" /tmp/patch-asset-prefix.mjs "${CDN_ORIGIN}" /app; then
            echo "::warning::${STAGING_TAG} bundle format not recognized by the patch script; deploying it untouched"
            echo "patched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Patching is deploy policy: the script and this 4-line wrapper
          # both live in this repo, and the script is bind-mounted into the
          # build — nothing is baked into product images, so ANY image is
          # patchable. The teable.asset-prefix label written here is the same
          # contract the idempotency check above reads.
          docker build -t app-cdn-variant \
            --build-arg BASE_IMAGE="${ECR_IMAGE}:${STAGING_TAG}" \
            --build-arg CDN_ORIGIN="${CDN_ORIGIN}" \
            -f - .github/scripts <<'EOF'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          ARG CDN_ORIGIN
          RUN --mount=type=bind,source=patch-asset-prefix.mjs,target=/tmp/patch-asset-prefix.mjs \
              node /tmp/patch-asset-prefix.mjs "${CDN_ORIGIN}" /app
          ENV NEXT_BUILD_ENV_ASSET_PREFIX=${CDN_ORIGIN}
          LABEL teable.asset-prefix=${CDN_ORIGIN}
          EOF
          echo "patched=true" >> "$GITHUB_OUTPUT"

      - name: Smoke-check the patched image
        if: steps.existing.outputs.exists == 'false' && steps.patch.outputs.patched == 'true'
        run: |
          set -euo pipefail
          docker run --rm --entrypoint sh app-cdn-variant -c '
            set -e
            SAMPLE=$(ls /app/enterprise/app-ee/.next/static/chunks/turbopack-*.js | head -1)
            grep -q "'"${CDN_ORIGIN}"'/_next/" "$SAMPLE"
            [ "$NEXT_BUILD_ENV_ASSET_PREFIX" = "'"${CDN_ORIGIN}"'" ]
            echo "smoke OK: $SAMPLE"
          '

      - name: Upload patched static assets to S3 (append-only)
        if: steps.existing.outputs.exists == 'false' && steps.patch.outputs.patched == 'true'
        run: |
          set -euo pipefail
          CID=$(docker create app-cdn-variant)
          docker cp "$CID:/app/enterprise/app-ee/.next/static" ./static-out
          docker rm "$CID" >/dev/null
          # NEVER --delete here: chunks of other builds must survive.
          aws s3 cp ./static-out "s3://${ASSET_BUCKET}/_next/static/" \
            --recursive --exclude "*.woff2" --only-show-errors
          aws s3 cp ./static-out "s3://${ASSET_BUCKET}/_next/static/" \
            --recursive --exclude "*" --include "*.woff2" \
            --content-type font/woff2 --only-show-errors
          echo "uploaded $(find ./static-out -type f | wc -l) files"

      - name: Invalidate CloudFront runtime chunks and wait
        if: steps.existing.outputs.exists == 'false' && steps.patch.outputs.patched == 'true'
        run: |
          set -euo pipefail
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/_next/static/chunks/turbopack-*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --id "$INV_ID"

      - name: Push patched image back under the same staging tag
        if: steps.existing.outputs.exists == 'false' && steps.patch.outputs.patched == 'true'
        run: |
          set -euo pipefail
          docker tag app-cdn-variant "${ECR_IMAGE}:${STAGING_TAG}"
          docker push "${ECR_IMAGE}:${STAGING_TAG}"

  deploy-sandbox:
    name: Deploy Sandbox to Staging ECS
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download sandbox task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable-sandbox-staging \
            --query taskDefinition > sandbox-task-definition-raw.json

      - name: Clean sandbox task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            sandbox-task-definition-raw.json > sandbox-task-definition.json

      - name: Render sandbox task definition with new image
        id: render-sandbox-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: sandbox-task-definition.json
          container-name: sandbox
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-sandbox-cloud:${{ needs.prepare.outputs.staging_tag }}

      - name: Deploy sandbox to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-sandbox-task-def.outputs.task-definition }}
          service: teable-sandbox-service
          cluster: teable-staging
          wait-for-service-stability: true

  deploy-app:
    name: Deploy Main to Staging ECS
    # patch-cdn must have finished (patched image pushed back under the same
    # tag, assets live on the CDN) before anything pulls the image.
    needs: [prepare, patch-cdn]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable-staging \
            --query taskDefinition > task-definition-raw.json

      - name: Clean task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            task-definition-raw.json > task-definition.json

      - name: Render task definition with new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: teable
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-cloud:${{ needs.prepare.outputs.staging_tag }}

      - name: Run database migration as one-off task
        run: |
          # Get network config from the service for RunTask
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster teable-staging \
            --services teable-staging-service \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Register a temporary task definition with the new image for migration
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migration with task definition: $TASK_DEF_ARN"

          # Run migration as a one-off task with command override
          TASK_ARN=$(aws ecs run-task \
            --cluster teable-staging \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "teable",
                "command": ["migrate-only"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task started: $TASK_ARN"

          # Wait for migration task to complete
          echo "Waiting for migration to complete..."
          aws ecs wait tasks-stopped --cluster teable-staging --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster teable-staging \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`teable`].exitCode | [0]' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            # Print migration task logs for debugging
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /ecs/teable \
              --log-stream-name "ecs/teable/$TASK_ID" \
              --limit 50 \
              --query 'events[*].message' \
              --output text 2>/dev/null || true
            exit 1
          fi

          echo "Database migration completed successfully"

      - name: Update task definition with skip-migrate command
        run: |
          # Add skip-migrate command to the main container and remove the db-migrate init container if present
          jq '(.containerDefinitions[] | select(.name == "teable")).command = ["skip-migrate"]
              | .containerDefinitions = [.containerDefinitions[] | select(.name != "db-migrate")]
              | (.containerDefinitions[] | select(.name == "teable")) |= del(.dependsOn)' \
            "${{ steps.render-task-def.outputs.task-definition }}" > task-definition-skip-migrate.json

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition-skip-migrate.json
          service: teable-staging-service
          cluster: teable-staging
          wait-for-service-stability: true

      - name: Ensure BYODB migration worker ECS service
        env:
          AWS_REGION: us-west-2
          ECS_CLUSTER: teable-staging
          APP_SERVICE: teable-staging-service
          APP_CONTAINER: teable
          APP_TASK_DEFINITION_FILE: task-definition-skip-migrate.json
          WORKER_TASK_FAMILY: teable-staging-byodb-migration-worker
          WORKER_SERVICE: teable-staging-byodb-migration-worker
          WORKER_OTEL_SERVICE_NAME: teable-ai-staging-byodb-migration-worker
        run: .github/scripts/ensure-byodb-migration-worker-ecs.sh

  notify:
    name: Record Deployment in Teable
    needs: [prepare, deploy-sandbox, deploy-app]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Update Staging Status in Releases table
        if: inputs.release_record_id != ''
        env:
          RECORD_ID: ${{ inputs.release_record_id }}
          DEPLOY_RESULT: ${{ (needs.deploy-app.result == 'success' && needs.deploy-sandbox.result == 'success') && 'Deployed' || 'Failed' }}
        run: |
          echo "Updating record $RECORD_ID Staging Status to $DEPLOY_RESULT"
          update_payload=$(jq -n \
            --arg status "$DEPLOY_RESULT" \
            '{
              "fieldKeyType": "id",
              "typecast": true,
              "record": {
                "fields": {
                  "fldDTDMmcyJ7jmn6YsH": $status
                }
              }
            }')
          curl -s -o /dev/null -w "Update HTTP %{http_code}\n" -X PATCH \
            "https://app.teable.ai/api/table/tblAhVLOxNtvkaF1ii5/record/${RECORD_ID}" \
            -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d "$update_payload"

      - name: Send Feishu staging deploy notification
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          AUTHOR: ${{ inputs.release_author || 'unknown' }}
          PR: ${{ inputs.release_pr || '无' }}
          ISSUES: ${{ inputs.release_issues || '无关联 Issue' }}
          DEPLOY_SUCCESS: ${{ (needs.deploy-app.result == 'success' && needs.deploy-sandbox.result == 'success') && 'true' || 'false' }}
        run: |
          RELEASE_TAG="${IMAGE_TAG}"

          if [ "$DEPLOY_SUCCESS" = "true" ]; then
            HEADER_COLOR="yellow"
            TITLE="🚀 Staging 部署成功 ${RELEASE_TAG}"
          else
            HEADER_COLOR="red"
            TITLE="❌ Staging 部署失败 ${RELEASE_TAG}"
          fi

          # Format issues as bullet list
          ISSUE_LIST=$(echo "$ISSUES" | sed 's/^/• /' | sed '/^• $/d')
          if [ -z "$ISSUE_LIST" ]; then
            ISSUE_LIST="无关联 Issue"
          fi

          card_payload=$(jq -n \
            --arg title "$TITLE" \
            --arg color "$HEADER_COLOR" \
            --arg tag "$RELEASE_TAG" \
            --arg author "$AUTHOR" \
            --arg pr "$PR" \
            --arg issues "$ISSUE_LIST" \
            '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": $title },
                  "template": $color
                },
                "elements": [
                  {
                    "tag": "div",
                    "fields": [
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**Tag**\n" + $tag) } },
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**Author**\n" + $author) } },
                      { "is_short": true, "text": { "tag": "lark_md", "content": ("**PR**\n" + $pr) } }
                    ]
                  },
                  { "tag": "hr" },
                  {
                    "tag": "div",
                    "text": { "tag": "lark_md", "content": ("**📋 关联 Issue：**\n" + $issues) }
                  }
                ]
              }
            }')

          http_code=$(curl -s -w "%{http_code}" -o /tmp/feishu.json -X POST \
            'https://open.feishu.cn/open-apis/bot/v2/hook/66b6ebf2-9bbd-4e41-b629-4062a6be4a42' \
            -H 'Content-Type: application/json' \
            -d "$card_payload")

          echo "Feishu notification HTTP: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::warning::Feishu notification failed"
            cat /tmp/feishu.json
          fi
