name: Preview EE PR

on:
  repository_dispatch:
    types: [preview-ee]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Comment build progress on PR
        run: |
          BODY="🚀 Your preview EE environment is being built. You can view the progress at [this link](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          curl -X POST \
            -H "Authorization: token ${{ secrets.PACKAGES_KEY }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/teableio/teable-ee/issues/${{ github.event.client_payload.pr_number }}/comments" \
            -d "{\"body\":\"${BODY}\"}"

  build-push:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      pr_number: ${{ github.event.client_payload.pr_number }}
      ref: ${{ github.event.client_payload.ref }}
      main_commit_sha: ${{ steps.get_sha.outputs.sha }}
      main_commit_author: ${{ steps.get_commit_info.outputs.author }}
    strategy:
      matrix:
        include:
          - image: teable-ee-preview
            file: Dockerfile
          - image: teable-sandbox-ee-preview
            file: Dockerfile.sandbox
    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Get teable-ee SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: get_commit_info
        run: |
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT

      - name: Login to Ali container registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shenzhen.aliyuncs.com
          username: ${{ vars.ALI_DOCKER_USERNAME }}
          password: ${{ secrets.ALI_DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
      - name: ⚙️ Install zx
        run: npm install -g zx

      - name: ⚙️ Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            registry.cn-shenzhen.aliyuncs.com/teable/${{ matrix.image }}
            ghcr.io/teableio/${{ matrix.image }}
            649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/${{ matrix.image }}
          tags: |
            type=raw,value=alpha-pr-${{ github.event.client_payload.pr_number }}
            type=raw,value=${{ steps.get_sha.outputs.sha }}
      - name: ⚙️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 📦 Build and push
        run: |
          zx scripts/build-image.mjs --file=dockers/teable/${{ matrix.file }} \
              --build-arg="ENABLE_CSP=false" \
              --build-arg="SENTRY_ENABLED=false" \
              --build-arg="NEXT_BUILD_ENV_EDITION=EE" \
              --tag="${{ steps.meta.outputs.tags }}" \
              --platform="linux/amd64" \
              --push

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    env:
      NAMESPACE: 38puz7wo
      INSTANCE_NAME: pr-ee-${{ github.event.client_payload.pr_number }}
      INSTANCE_DOMAIN: pr-ee-${{ github.event.client_payload.pr_number }}
      DISPLAY_NAME: "teable-pr-ee-${{ github.event.client_payload.pr_number }}"
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}
          ref: ${{ github.event.client_payload.ref }}

      - name: Get teable-ee SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check tracing label
        id: labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGES_KEY }}
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: 'teableio',
              repo: 'teable-ee',
              pull_number: Number(context.payload.client_payload.pr_number),
            });
            const labels = pullRequest.labels.map((label) => label.name);
            const enableTracing = labels.includes('tracing');
            core.setOutput('enable_tracing', String(enableTracing));
            console.log('PR labels:', labels.join(', '));
            console.log('Enable tracing:', enableTracing);

      - name: Create deployment YAML
        env:
          MAIN_IMAGE_REPOSITORY: registry.cn-shenzhen.aliyuncs.com/teable/teable-ee-preview
          SANDBOX_IMAGE_REPOSITORY: registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-ee-preview
          IMAGE_TAG: ${{ steps.get_sha.outputs.sha }}
          ENABLE_TRACING: ${{ steps.labels.outputs.enable_tracing }}
          PREVIEW_EE_ENTERPRISE_LICENSE_KEY: ${{ secrets.PREVIEW_EE_ENTERPRISE_LICENSE_KEY }}
          PREVIEW_CONFIG_SOURCE: ${{ secrets.PREVIEW_CONFIG_SOURCE }}
        run: |
          if [ -z "${PREVIEW_EE_ENTERPRISE_LICENSE_KEY}" ]; then
            echo "::error::Missing PREVIEW_EE_ENTERPRISE_LICENSE_KEY secret"
            exit 1
          fi
          if [ -z "${PREVIEW_CONFIG_SOURCE}" ]; then
            echo "::error::Missing PREVIEW_CONFIG_SOURCE secret"
            exit 1
          fi

          if [ "${ENABLE_TRACING}" = "true" ]; then
            OTEL_EXPORTER_OTLP_ENDPOINT="http://teable-${{ env.INSTANCE_NAME }}-jaeger:4318/v1/traces"
            TRACE_LINK_BASE_URL="https://jaeger-${{ env.INSTANCE_DOMAIN }}.sealoshzh.site"
          else
            OTEL_EXPORTER_OTLP_ENDPOINT=""
            TRACE_LINK_BASE_URL=""
          fi

          cp .github/workflows/templates/preview-template.yaml deploy.yaml
          sed -i "s#__NAMESPACE__#${{ env.NAMESPACE }}#g" deploy.yaml
          sed -i "s#__INSTANCE_NAME__#${{ env.INSTANCE_NAME }}#g" deploy.yaml
          sed -i "s#__INSTANCE_DOMAIN__#${{ env.INSTANCE_DOMAIN }}#g" deploy.yaml
          sed -i "s#__MAIN_IMAGE_REPOSITORY__#${{ env.MAIN_IMAGE_REPOSITORY }}#g" deploy.yaml
          sed -i "s#__SANDBOX_IMAGE_REPOSITORY__#${{ env.SANDBOX_IMAGE_REPOSITORY }}#g" deploy.yaml
          sed -i "s#__IMAGE_TAG__#${{ env.IMAGE_TAG }}#g" deploy.yaml
          sed -i "s#__DISPLAY_NAME__#${{ env.DISPLAY_NAME }}#g" deploy.yaml
          sed -i "s#__OTEL_EXPORTER_OTLP_ENDPOINT__#${OTEL_EXPORTER_OTLP_ENDPOINT}#g" deploy.yaml
          sed -i "s#__TRACE_LINK_BASE_URL__#${TRACE_LINK_BASE_URL}#g" deploy.yaml

          if [ "${ENABLE_TRACING}" = "true" ]; then
            sed -i '/^#__JAEGER_ENABLED_/d' deploy.yaml
          else
            sed -i '/^#__JAEGER_ENABLED_START__$/, /^#__JAEGER_ENABLED_END__$/d' deploy.yaml
          fi

          LICENSE_SECRET=$(cat <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: teable-${{ env.INSTANCE_NAME }}-enterprise-license
            labels:
              cloud.sealos.io/app-deploy-manager: teable-${{ env.INSTANCE_NAME }}
              cloud.sealos.io/deploy-on-sealos: teable-${{ env.INSTANCE_NAME }}
          type: Opaque
          stringData:
            LICENSE_KEY: ${PREVIEW_EE_ENTERPRISE_LICENSE_KEY}

          ---
          EOF
          )
          LICENSE_ENV=$(cat <<EOF
                      - name: BACKEND_ENTERPRISE_LICENSE_KEY
                        valueFrom:
                          secretKeyRef:
                            name: teable-${{ env.INSTANCE_NAME }}-enterprise-license
                            key: LICENSE_KEY
                      - name: BACKEND_ENTERPRISE_LICENSE_AUTO_ACTIVATE_STRICT
                        value: 'true'
          EOF
          )
          PREVIEW_CONFIG_SOURCE_B64=$(printf '%s' "${PREVIEW_CONFIG_SOURCE}" | base64 -w0)
          PREVIEW_CONFIG_SECRET=$(cat <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: teable-${{ env.INSTANCE_NAME }}-preview-config
            labels:
              cloud.sealos.io/app-deploy-manager: teable-${{ env.INSTANCE_NAME }}
              cloud.sealos.io/deploy-on-sealos: teable-${{ env.INSTANCE_NAME }}
          type: Opaque
          data:
            PREVIEW_CONFIG_SOURCE: ${PREVIEW_CONFIG_SOURCE_B64}

          ---
          EOF
          )
          PREVIEW_CONFIG_ENV=$(cat <<EOF
                      - name: PREVIEW_CONFIG_SOURCE
                        valueFrom:
                          secretKeyRef:
                            name: teable-${{ env.INSTANCE_NAME }}-preview-config
                            key: PREVIEW_CONFIG_SOURCE
          EOF
          )
          PREVIEW_EXTRA_RESOURCES="${LICENSE_SECRET}"$'\n'"${PREVIEW_CONFIG_SECRET}"
          PREVIEW_EXTRA_ENV="${LICENSE_ENV}
          ${PREVIEW_CONFIG_ENV}"
          PREVIEW_EXTRA_RESOURCES="${PREVIEW_EXTRA_RESOURCES}" PREVIEW_EXTRA_ENV="${PREVIEW_EXTRA_ENV}" perl -0pi -e 's/# __PREVIEW_EXTRA_RESOURCES__/$ENV{PREVIEW_EXTRA_RESOURCES}/g; s/            #__PREVIEW_EXTRA_ENV__/$ENV{PREVIEW_EXTRA_ENV}/g' deploy.yaml

      - name: Apply deploy job
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: apply -f deploy.yaml

      - name: Checkout deployment tooling
        uses: actions/checkout@v4
        with:
          path: deployment-tooling

      - name: Ensure BYODB migration worker deployment
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          NAMESPACE: ${{ env.NAMESPACE }}
          APP_DEPLOYMENT: teable-${{ env.INSTANCE_NAME }}
          APP_CONTAINER: teable-${{ env.INSTANCE_NAME }}
          WORKER_DEPLOYMENT: teable-${{ env.INSTANCE_NAME }}-byodb-migration-worker
          WORKER_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-ee-preview:${{ steps.get_sha.outputs.sha }}
          WORKER_OTEL_SERVICE_NAME: teable-preview-${{ env.INSTANCE_NAME }}-byodb-migration-worker
        run: deployment-tooling/.github/scripts/ensure-byodb-migration-worker.sh

      - name: Rollout status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }}-sandbox --timeout=300s

      - name: Rollout main status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }} --timeout=300s

      - name: Rollout Jaeger status
        if: steps.labels.outputs.enable_tracing == 'true'
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-${{ env.INSTANCE_NAME }}-jaeger --timeout=300s

      - name: Wait for application health check
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: exec deployment/teable-${{ env.INSTANCE_NAME }} -- curl -f --retry 30 --retry-delay 5 --retry-connrefused http://localhost:3000/health

      - name: Create deployment status comment
        if: always()
        run: |
          SUCCESS="${{ job.status == 'success' }}"
          DOMAIN="pr-ee-${{ github.event.client_payload.pr_number }}"
          URL="https://${DOMAIN}.sealoshzh.site"
          TRACING_ENABLED="${{ steps.labels.outputs.enable_tracing }}"
          JAEGER_URL="https://jaeger-${DOMAIN}.sealoshzh.site"

          if [ "$SUCCESS" = "true" ]; then
            STATUS="✅ Success"
            BODY="**Deployment Status: ${STATUS}** 🔗 Preview URL: ${URL}"
            if [ "$TRACING_ENABLED" = "true" ]; then
              BODY="${BODY} 🔎 Jaeger URL: ${JAEGER_URL}"
            fi
          else
            STATUS="❌ Failed"
            BODY="**Deployment Status: ${STATUS}**"
          fi

          curl -X POST \
            -H "Authorization: token ${{ secrets.PACKAGES_KEY }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/teableio/teable-ee/issues/${{ github.event.client_payload.pr_number }}/comments" \
            -d "{\"body\":\"${BODY}\"}"
