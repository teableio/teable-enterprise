# EE Remote CI — formula-sql-pg suite (mirrors retired teable-ee
# "V2 Formula SQL (PostgreSQL Matrix)").
# One workflow per suite so partial reruns produce clean run pages. SOURCE OF
# TRUTH lives in teable-ee .github/enterprise-ci/ and is synced here.

name: EE Remote CI (formula-sql-pg)

run-name: 'EE Remote CI formula-sql-pg — PR #${{ github.event.client_payload.pr_number }} ${{ github.event.client_payload.log_tag }}'

on:
  repository_dispatch:
    types: [ee-remote-ci-formula-sql-pg]

concurrency:
  group: ee-remote-ci-formula-sql-pg-${{ github.event.client_payload.pr_number || github.event.client_payload.ee_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  EE_SHA: ${{ github.event.client_payload.ee_sha }}
  LOG_TAG: ${{ github.event.client_payload.log_tag }}
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  LOG_DIR: /tmp/ci-logs
  LOGS_REPO: teableio/teable-ci-logs

jobs:
  deps:
    runs-on: ubuntu-latest
    name: Formula SQL Dependencies
    timeout-minutes: 15
    env:
      CI: 1
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      TESTCONTAINERS_RYUK_DISABLED: 'true'

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install
        with:
          install-args: |
            --filter
            @teable/v2-formula-sql-pg...

      - name: ☁️ Upload workspace dependencies
        uses: ./.github/actions/workspace-deps-upload
        with:
          name: formula-sql-pg-deps-${{ github.run_id }}

  pglite:
    needs: [deps]
    runs-on: ubuntu-latest
    name: Formula SQL (pglite)
    timeout-minutes: 20
    env:
      CI: 1
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      TESTCONTAINERS_RYUK_DISABLED: 'true'

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Restore workspace dependencies
        uses: ./.github/actions/workspace-deps-download
        with:
          name: formula-sql-pg-deps-${{ github.run_id }}

      - name: 🧪 Run formula SQL unit tests
        run: |
          mkdir -p "$LOG_DIR"
          status=0
          {
            echo "=== formula SQL pglite unit ==="
            pnpm --filter @teable/v2-formula-sql-pg test-unit
          } >> "$LOG_DIR/formula-sql-pg-pglite.log" 2>&1 || status=$?
          echo "formula-sql-pg pglite exit=$status ($(wc -l < "$LOG_DIR/formula-sql-pg-pglite.log") log lines)"
          exit $status

      - name: 📤 Ship log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p "$LOG_DIR"
          [ -f "$LOG_DIR/formula-sql-pg-pglite.log" ] || echo "(no log produced — job failed before its first logged step)" > "$LOG_DIR/formula-sql-pg-pglite.log"
          gh release create "$LOG_TAG" -R "$LOGS_REPO" --title "EE Remote CI $LOG_TAG (PR #$PR_NUMBER)" --notes "ee_sha=$EE_SHA run=$RUN_URL" 2>/dev/null || true
          gh release upload "$LOG_TAG" "$LOG_DIR/formula-sql-pg-pglite.log" -R "$LOGS_REPO" --clobber
          if [ "$JOB_STATUS" != "success" ]; then
            echo failed > "$LOG_DIR/formula-sql-pg-pglite.failed"
            gh release upload "$LOG_TAG" "$LOG_DIR/formula-sql-pg-pglite.failed" -R "$LOGS_REPO" --clobber
          fi

  postgres:
    needs: [deps]
    runs-on: ubuntu-latest
    name: Formula SQL (Postgres PG${{ matrix.pgMajor }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        pgMajor: [14, 16, 18]
    env:
      CI: 1
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      TESTCONTAINERS_RYUK_DISABLED: 'true'
      TEABLE_V2_TEST_PG_IMAGE: postgres:${{ matrix.pgMajor }}-alpine
      TEABLE_V2_RUN_PG_INTEGRATION: '1'

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Restore workspace dependencies
        uses: ./.github/actions/workspace-deps-download
        with:
          name: formula-sql-pg-deps-${{ github.run_id }}

      - name: 🧪 Run Postgres integration smoke
        run: |
          mkdir -p "$LOG_DIR"
          SLUG="pg${{ matrix.pgMajor }}"
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          status=0
          {
            echo "=== formula SQL postgres PG${{ matrix.pgMajor }} ==="
            pnpm --filter @teable/v2-formula-sql-pg exec vitest run src/PgTypeValidation.pg-integration.spec.ts --silent
          } >> "$LOG_DIR/formula-sql-pg-$SLUG.log" 2>&1 || status=$?
          echo "formula-sql-pg $SLUG exit=$status ($(wc -l < "$LOG_DIR/formula-sql-pg-$SLUG.log") log lines)"
          exit $status

      - name: 📤 Ship log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p "$LOG_DIR"
          SLUG="${SLUG:-pg${{ matrix.pgMajor }}}"
          [ -f "$LOG_DIR/formula-sql-pg-$SLUG.log" ] || echo "(no log produced — job failed before its first logged step)" > "$LOG_DIR/formula-sql-pg-$SLUG.log"
          gh release create "$LOG_TAG" -R "$LOGS_REPO" --title "EE Remote CI $LOG_TAG (PR #$PR_NUMBER)" --notes "ee_sha=$EE_SHA run=$RUN_URL" 2>/dev/null || true
          gh release upload "$LOG_TAG" "$LOG_DIR/formula-sql-pg-$SLUG.log" -R "$LOGS_REPO" --clobber
          if [ "$JOB_STATUS" != "success" ]; then
            echo failed > "$LOG_DIR/formula-sql-pg-$SLUG.failed"
            gh release upload "$LOG_TAG" "$LOG_DIR/formula-sql-pg-$SLUG.failed" -R "$LOGS_REPO" --clobber
          fi

  verdict:
    needs: [deps, pglite, postgres]
    if: always()
    runs-on: ubuntu-latest
    name: Formula SQL PG Matrix verdict
    timeout-minutes: 5
    steps:
      - name: 📦 Checkout teable-ee (.github only)
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false
          sparse-checkout: |
            .github

      - name: 🎫 Mint App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RCI_APP_ID }}
          private-key: ${{ secrets.RCI_APP_PRIVATE_KEY }}
          owner: teableio
          repositories: teable-ee

      - name: 🧾 Conclude check run
        uses: ./.github/actions/remote-ci-conclude
        with:
          suite: formula-sql-pg
          results: 'deps=${{ needs.deps.result }} pglite=${{ needs.pglite.result }} postgres=${{ needs.postgres.result }}'
          app-token: ${{ steps.app.outputs.token }}
          logs-token: ${{ secrets.PACKAGES_KEY }}

      - name: 📨 Dispatch ee-remote-ci-done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
        run: |
          gh api repos/teableio/teable-ee/dispatches \
            -f event_type=ee-remote-ci-done \
            -f "client_payload[suite]=formula-sql-pg" \
            -f "client_payload[pr_number]=${PR_NUMBER}" \
            -f "client_payload[ee_sha]=${EE_SHA}" \
            -f "client_payload[log_tag]=${LOG_TAG}" \
            -f "client_payload[remote_run_url]=${RUN_URL}" \
            -f "client_payload[check_run_id]=${{ github.event.client_payload.check_run_id }}" \
            -f "client_payload[results]=deps=${{ needs.deps.result }} pglite=${{ needs.pglite.result }} postgres=${{ needs.postgres.result }}"
