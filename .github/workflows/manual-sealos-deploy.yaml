name: Manual Sealos Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., release.2026-04-20T10-38-57Z.1)'
        required: true
      trigger:
        description: 'Who triggered this deployment'
        required: false
        default: 'Manual'
      release_created_time:
        description: 'Creation time of the Release record that triggered this deploy'
        required: false
        default: ''
      release_record_id:
        description: 'Cloud Release record ID used to track publishing progress'
        required: false
        default: ''
      related_release_record_ids:
        description: 'Comma-separated Release record IDs to link on the Launch'
        required: false
        default: ''
      refined_changelog:
        description: 'Reviewed English changelog to store on the Launch'
        required: false
        default: ''
      refined_changelog_zh:
        description: 'Reviewed Chinese changelog to store on the Launch'
        required: false
        default: ''
      publish_mode:
        description: 'Release Publisher target mode: ai, cn, or all'
        required: false
        default: ''
      publish_lock_id:
        description: 'Release Publisher lock identifier'
        required: false
        default: ''
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      trigger:
        description: 'Who triggered this deployment'
        required: false
        type: string
        default: 'Automation'
      release_created_time:
        description: 'Creation time of the Release record that triggered this deploy'
        required: false
        type: string
        default: ''
      release_record_id:
        description: 'Cloud Release record ID used to track publishing progress'
        required: false
        type: string
        default: ''
      related_release_record_ids:
        description: 'Comma-separated Release record IDs to link on the Launch'
        required: false
        type: string
        default: ''
      refined_changelog:
        description: 'Reviewed English changelog to store on the Launch'
        required: false
        type: string
        default: ''
      refined_changelog_zh:
        description: 'Reviewed Chinese changelog to store on the Launch'
        required: false
        type: string
        default: ''
      publish_mode:
        description: 'Release Publisher target mode: ai, cn, or all'
        required: false
        type: string
        default: ''
      publish_lock_id:
        description: 'Release Publisher lock identifier'
        required: false
        type: string
        default: ''
    outputs:
      start_time:
        description: 'Deployment start timestamp'
        value: ${{ jobs.deploy.outputs.start_time }}
      image_tag:
        description: 'Deployed image tag'
        value: ${{ jobs.deploy.outputs.image_tag }}
    secrets:
      KUBE_CONFIG:
        required: true
      PRISMA_DATABASE_URL:
        required: true
      TEABLE_API_TOKEN:
        required: false
      # Used by the ensure-aliyun job (ghcr pull / Aliyun push) — callers
      # not using `secrets: inherit` must pass these for the self-heal
      # copy to work.
      PACKAGES_KEY:
        required: false
      ALI_DOCKER_PASSWORD:
        required: false
      # Used by the preheat-sandbox-agent job — same contract as above.
      INFRA_TEABLE_CN_PREHEAT_TOKEN:
        required: false

jobs:
  # teable.cn deploys official release.<id> tags from Aliyun, but Aliyun
  # only receives images at release time (manual-ecs-deploy's sync-aliyun).
  # This job makes the CN launch self-sufficient: if this build was never
  # released yet, its release.<id> is first stamped on ghcr from the
  # beta-<id> staging twin, then any tag missing on Aliyun is copied over —
  # so the CN and AI launches can run in either order. Idempotent:
  # near-instant when the tags already exist.
  ensure-aliyun:
    name: Ensure release images on Aliyun
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Stamp and copy any missing images
        env:
          SRC_CREDS: ${{ github.actor }}:${{ secrets.PACKAGES_KEY }}
          DST_CREDS: ${{ vars.ALI_DOCKER_USERNAME }}:${{ secrets.ALI_DOCKER_PASSWORD }}
          SRC_REGISTRY: ghcr.io/teableio
          DST_REGISTRY: registry.cn-shenzhen.aliyuncs.com/teable
          TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          BETA_TAG="beta-${TAG#release.}"

          retry_copy() {
            local src="$1" dst="$2" dst_creds="$3"
            for attempt in 1 2 3; do
              if skopeo copy --all \
                  --src-creds="$SRC_CREDS" \
                  --dest-creds="$dst_creds" \
                  "docker://${src}" "docker://${dst}"; then
                return 0
              fi
              echo "⚠️ attempt ${attempt} failed for ${src}, retrying in 10s"
              sleep 10
            done
            echo "❌ failed to copy ${src} -> ${dst}"
            return 1
          }

          # The agent is included because CN sandboxes pull
          # <aliyun prefix>:<the app's release id> at spawn time; it always
          # carries the release tag already (tagged at build time).
          for image in teable-cloud teable-sandbox-cloud teable-sandbox-agent; do
            if skopeo inspect --raw --creds="$DST_CREDS" \
                "docker://${DST_REGISTRY}/${image}:${TAG}" >/dev/null 2>&1; then
              echo "✅ ${image}:${TAG} already on Aliyun"
              continue
            fi

            if ! skopeo inspect --raw --creds="$SRC_CREDS" \
                "docker://${SRC_REGISTRY}/${image}:${TAG}" >/dev/null 2>&1; then
              echo "⏫ ${image}:${TAG} not stamped yet, stamping from ${BETA_TAG} on ghcr"
              retry_copy \
                "${SRC_REGISTRY}/${image}:${BETA_TAG}" \
                "${SRC_REGISTRY}/${image}:${TAG}" \
                "$SRC_CREDS"
            fi

            echo "⏫ ${image}:${TAG} missing on Aliyun, copying from ghcr"
            retry_copy \
              "${SRC_REGISTRY}/${image}:${TAG}" \
              "${DST_REGISTRY}/${image}:${TAG}" \
              "$DST_CREDS"
          done

  # Preheat CN sandbox-agent nodes as soon as the agent tag lands on Aliyun,
  # so a CN-first launch doesn't wait for the AI launch's both-cloud preheat.
  # Best-effort: not part of the notify gating — a preheat miss only costs
  # first-spawn latency.
  preheat-sandbox-agent:
    needs: ensure-aliyun
    if: needs.ensure-aliyun.result == 'success'
    uses: ./.github/workflows/preheat-sandbox-agent-cloud.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
      targets: cn
    secrets: inherit

  deploy:
    name: Deploy to Sealos
    needs: ensure-aliyun
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      image_tag: ${{ inputs.image_tag }}

    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update sandbox deployment
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: set image deployment/teable-sandbox-cloud teable-sandbox-cloud=registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-cloud:${{ inputs.image_tag }}

      - name: Update sandbox deployment annotations
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: annotate deployment/teable-sandbox-cloud originImageName="registry.cn-shenzhen.aliyuncs.com/teable/teable-sandbox-cloud:${{ inputs.image_tag }}" --overwrite

      - name: Rollout sandbox status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-sandbox-cloud

      - name: Create Job YAML
        run: |
          cat <<EOF > migration-job.yaml
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: teable-migration-${{ github.run_number }}
            labels:
              cloud.sealos.io/deploy-on-sealos: teable
          spec:
            completions: 1
            template:
              metadata:
                name: teable-cloud-teable
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: teable-cloud
                containers:
                  - name: teable
                    image: "registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud:${{ inputs.image_tag }}"
                    imagePullPolicy: IfNotPresent
                    args:
                      - migrate-only
                    env:
                      - name: "PRISMA_DATABASE_URL"
                        value: "${{ secrets.PRISMA_DATABASE_URL }}"
                    resources:
                      limits:
                        memory: 512Mi
                        cpu: 500m
                      requests:
                        cpu: 100m
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
          EOF

      - name: Clean up existing migration job
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: delete job teable-migration-${{ github.run_number }} --ignore-not-found=true

      - name: Apply migration job
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: apply -f migration-job.yaml

      - name: Wait for migration job to complete
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: wait --for=condition=complete job/teable-migration-${{ github.run_number }} --timeout=3600s

      - name: Update application deployment
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: set image deployment/teable-cloud teable-cloud=registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud:${{ inputs.image_tag }}

      - name: Update deployment annotations
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: annotate deployment/teable-cloud originImageName="registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud:${{ inputs.image_tag }}" --overwrite

      - name: Ensure BYODB migration worker deployment
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          APP_DEPLOYMENT: teable-cloud
          APP_CONTAINER: teable-cloud
          WORKER_DEPLOYMENT: teable-cloud-byodb-migration-worker
          WORKER_IMAGE: registry.cn-shenzhen.aliyuncs.com/teable/teable-cloud:${{ inputs.image_tag }}
          WORKER_OTEL_SERVICE_NAME: teable-cloud-byodb-migration-worker
        run: .github/scripts/ensure-byodb-migration-worker.sh

      - name: Rollout status
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/teable-cloud


  notify:
    name: Record teable.cn Launch
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create teable.cn Launch
        env:
          TEABLE_API_TOKEN: ${{ secrets.TEABLE_API_TOKEN }}
          REGION: teable.cn
          IMAGE_TAG: ${{ inputs.image_tag }}
          TRIGGER: ${{ inputs.trigger || github.actor }}
          RELEASE_CREATED_TIME: ${{ inputs.release_created_time }}
          RELEASE_RECORD_ID: ${{ inputs.release_record_id }}
          RELATED_RELEASE_RECORD_IDS: ${{ inputs.related_release_record_ids }}
          REFINED_CHANGELOG: ${{ inputs.refined_changelog }}
          REFINED_CHANGELOG_ZH: ${{ inputs.refined_changelog_zh }}
          PUBLISH_LOCK_ID: ${{ inputs.publish_lock_id }}
        run: bash .github/scripts/record-teable-launch.sh

  finalize-release:
    name: Finalize Release publishing progress
    needs: notify
    if: >-
      needs.notify.result == 'success' &&
      inputs.release_record_id != '' &&
      inputs.publish_lock_id != ''
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-teable-release-${{ inputs.release_record_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record teable.cn completion
        env:
          TEABLE_API_TOKEN: ${{ secrets.TEABLE_API_TOKEN }}
          RELEASE_RECORD_ID: ${{ inputs.release_record_id }}
          PUBLISH_LOCK_ID: ${{ inputs.publish_lock_id }}
          TARGET: cn
        run: bash .github/scripts/finalize-teable-release.sh
