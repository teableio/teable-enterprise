name: Build teable EE

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_GITHUB: ghcr.io/teableio
  REGISTRY_DOCKERHUB: docker.io/teableio
  CE_IMAGE_SUFFIX: ""
  EE_IMAGE_SUFFIX: "-ee"

on:
  workflow_dispatch:
    inputs:
      build_scope:
        description: 'Build scope for smoke testing or full release'
        required: false
        default: 'all'
        type: choice
        options:
          - sandbox
          - app
          - all
      release_timestamp:
        description: 'Optional UTC timestamp for release id (e.g. 2026-04-20T10:38:57Z)'
        required: false
        type: string
      release_sequence:
        description: 'Optional release id sequence suffix'
        required: false
        type: string
  repository_dispatch:
    types: [build-ee]

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      target_matrix_json: ${{ steps.release.outputs.target_matrix_json }}
      build_scope: ${{ steps.release.outputs.build_scope }}
      matrix_json: ${{ steps.release.outputs.matrix_json }}
      release_id: ${{ steps.release.outputs.release_id }}
      release_timestamp: ${{ steps.release.outputs.release_timestamp }}
      release_sequence: ${{ steps.release.outputs.release_sequence }}
    steps:
      - name: Compute release id
        id: release
        env:
          INPUT_BUILD_SCOPE: ${{ github.event.client_payload.build_scope || inputs.build_scope }}
          INPUT_RELEASE_ID: ${{ github.event.client_payload.release_id }}
          INPUT_RELEASE_TIMESTAMP: ${{ github.event.client_payload.release_timestamp || inputs.release_timestamp }}
          INPUT_RELEASE_SEQUENCE: ${{ github.event.client_payload.release_sequence || inputs.release_sequence }}
        run: |
          BUILD_SCOPE="${INPUT_BUILD_SCOPE:-all}"
          case "$BUILD_SCOPE" in
            app)
              TARGET_MATRIX_JSON='{"include":[{"target":"app","file":"Dockerfile","image":"teable"}]}'
              MATRIX_JSON='{"include":[{"target":"app","file":"Dockerfile","image":"teable","platform":"linux/amd64","platform_key":"linux-amd64","runner":"ubuntu-latest"},{"target":"app","file":"Dockerfile","image":"teable","platform":"linux/arm64","platform_key":"linux-arm64","runner":"ubuntu-24.04-arm"}]}'
              ;;
            sandbox)
              TARGET_MATRIX_JSON='{"include":[{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox"}]}'
              MATRIX_JSON='{"include":[{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox","platform":"linux/amd64","platform_key":"linux-amd64","runner":"ubuntu-latest"},{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox","platform":"linux/arm64","platform_key":"linux-arm64","runner":"ubuntu-24.04-arm"}]}'
              ;;
            all)
              TARGET_MATRIX_JSON='{"include":[{"target":"app","file":"Dockerfile","image":"teable"},{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox"}]}'
              MATRIX_JSON='{"include":[{"target":"app","file":"Dockerfile","image":"teable","platform":"linux/amd64","platform_key":"linux-amd64","runner":"ubuntu-latest"},{"target":"app","file":"Dockerfile","image":"teable","platform":"linux/arm64","platform_key":"linux-arm64","runner":"ubuntu-24.04-arm"},{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox","platform":"linux/amd64","platform_key":"linux-amd64","runner":"ubuntu-latest"},{"target":"sandbox","file":"Dockerfile.sandbox","image":"teable-sandbox","platform":"linux/arm64","platform_key":"linux-arm64","runner":"ubuntu-24.04-arm"}]}'
              ;;
            *)
              echo "Unsupported build_scope: $BUILD_SCOPE" >&2
              exit 1
              ;;
          esac

          if [ -n "$INPUT_RELEASE_ID" ]; then
            RELEASE_ID="$INPUT_RELEASE_ID"
            RELEASE_TIMESTAMP="${INPUT_RELEASE_TIMESTAMP}"
            RELEASE_SEQUENCE="${INPUT_RELEASE_SEQUENCE}"

            if [ -z "$RELEASE_TIMESTAMP" ] || [ -z "$RELEASE_SEQUENCE" ]; then
              RELEASE_BODY="${RELEASE_ID#release.}"
              RELEASE_SEQUENCE="${RELEASE_SEQUENCE:-${RELEASE_BODY##*.}}"
              RELEASE_TIMESTAMP_TAG="${RELEASE_BODY%.*}"
              RELEASE_TIMESTAMP="${RELEASE_TIMESTAMP:-$(printf '%s' "$RELEASE_TIMESTAMP_TAG" | sed -E 's/^([0-9]{4}-[0-9]{2}-[0-9]{2}T)([0-9]{2})-([0-9]{2})-([0-9]{2}Z)$/\1\2:\3:\4/')}"
            fi
          else
            RELEASE_TIMESTAMP="${INPUT_RELEASE_TIMESTAMP}"
            if [ -z "$RELEASE_TIMESTAMP" ]; then
              RELEASE_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            fi

            RELEASE_SEQUENCE="${INPUT_RELEASE_SEQUENCE:-${GITHUB_RUN_ATTEMPT:-${GITHUB_RUN_NUMBER:-1}}}"
            RELEASE_TIMESTAMP_NO_MS=$(printf '%s' "$RELEASE_TIMESTAMP" | sed -E 's/\.[0-9]{3}Z$/Z/')
            RELEASE_TIMESTAMP_TAG=$(printf '%s' "$RELEASE_TIMESTAMP_NO_MS" | tr ':' '-')
            RELEASE_ID="release.${RELEASE_TIMESTAMP_TAG}.${RELEASE_SEQUENCE}"
            RELEASE_TIMESTAMP="$RELEASE_TIMESTAMP_NO_MS"
          fi

          echo "build_scope=$BUILD_SCOPE" >> "$GITHUB_OUTPUT"
          echo "target_matrix_json=$TARGET_MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "matrix_json=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_timestamp=$RELEASE_TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "release_sequence=$RELEASE_SEQUENCE" >> "$GITHUB_OUTPUT"
          echo "Build scope: $BUILD_SCOPE"
          echo "Release id: $RELEASE_ID"

  track-start:
    needs: prepare-release
    uses: ./.github/workflows/track-build-teable.yaml
    with:
      action: create
      edition: ee
      status: Building
      release_id: ${{ needs.prepare-release.outputs.release_id }}
    secrets:
      TEABLE_API_TOKEN: ${{ secrets.TEABLE_API_TOKEN }}
      PACKAGES_KEY: ${{ secrets.PACKAGES_KEY }}

  build-push:
    needs: [prepare-release, track-start]
    runs-on: ${{ matrix.runner }}
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    strategy:
      matrix: ${{ fromJson(needs.prepare-release.outputs.matrix_json) }}

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}

      - name: Get teable-ee SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare generated Docker contexts
        if: matrix.file == 'Dockerfile'
        run: node ./scripts/generate-docker-contexts.mjs

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/teable/${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ENABLE_CSP=false
            NEXT_BUILD_ENV_EDITION=EE
            BUILD_VERSION=${{ needs.prepare-release.outputs.release_id }}
            FRONTEND_RELEASE=${{ needs.prepare-release.outputs.release_id }}
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.sha }}
          cache-from: type=gha,scope=release-ee-${{ matrix.target }}-${{ matrix.platform_key }}
          cache-to: type=gha,mode=max,scope=release-ee-${{ matrix.target }}-${{ matrix.platform_key }},ignore-error=true
          outputs: type=image,name=${{ env.REGISTRY_GITHUB }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest artifact
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_key }}.digest"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ matrix.platform_key }}
          path: /tmp/digests/${{ matrix.platform_key }}.digest
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    needs: [prepare-release, track-start, build-push]
    if: needs.build-push.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-release.outputs.target_matrix_json) }}

    steps:
      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta for canonical image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image }}
          tags: |
            type=raw,value=beta
            type=raw,value=${{ needs.build-push.outputs.sha }}
            type=raw,value=${{ needs.prepare-release.outputs.release_id }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.target }}
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Create canonical and EE alias manifests
        env:
          META_JSON: ${{ steps.meta.outputs.json }}
          CANONICAL_IMAGE: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image }}
          EE_ALIAS_IMAGE: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image }}${{ env.EE_IMAGE_SUFFIX }}
        run: |
          mapfile -t TAGS < <(jq -r '.tags[]' <<<"$META_JSON")
          mapfile -t DIGEST_FILES < <(find "/tmp/digests/${{ matrix.target }}" -type f -name '*.digest' | sort)

          if [ "${#DIGEST_FILES[@]}" -eq 0 ]; then
            echo "No digest artifacts found for ${{ matrix.target }}" >&2
            exit 1
          fi

          SOURCES=()
          for digest_file in "${DIGEST_FILES[@]}"; do
            digest="$(tr -d '\n' < "$digest_file")"
            SOURCES+=("${CANONICAL_IMAGE}@${digest}")
          done

          for full_tag in "${TAGS[@]}"; do
            tag_name="${full_tag##*:}"
            docker buildx imagetools create \
              --tag "${CANONICAL_IMAGE}:${tag_name}" \
              "${SOURCES[@]}"
            docker buildx imagetools create \
              --tag "${EE_ALIAS_IMAGE}:${tag_name}" \
              "${CANONICAL_IMAGE}:${tag_name}"
          done

  sync-dockerhub:
    needs: [prepare-release, track-start, merge-manifests]
    if: needs.merge-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Sync images to Docker Hub
        env:
          SRC_CREDS: ${{ github.actor }}:${{ secrets.PACKAGES_KEY }}
          DST_CREDS: ${{ vars.DOCKER_HUB_NAME }}:${{ secrets.DOCKER_HUB_AK }}
          BUILD_SCOPE: ${{ needs.prepare-release.outputs.build_scope }}
          TAGS: beta,${{ needs.build-push.outputs.sha }},${{ needs.prepare-release.outputs.release_id }}
        run: |
          set -euo pipefail

          IFS=',' read -ra TAG_LIST <<< "$TAGS"
          if [ "$BUILD_SCOPE" = "app" ]; then
            IMAGES=("teable" "teable-ee")
          elif [ "$BUILD_SCOPE" = "sandbox" ]; then
            IMAGES=("teable-sandbox" "teable-sandbox-ee")
          else
            IMAGES=("teable" "teable-ee" "teable-sandbox" "teable-sandbox-ee")
          fi

          for image in "${IMAGES[@]}"; do
            for tag in "${TAG_LIST[@]}"; do
              skopeo copy --all \
                --src-creds="$SRC_CREDS" \
                --dest-creds="$DST_CREDS" \
                "docker://${{ env.REGISTRY_GITHUB }}/${image}:${tag}" \
                "docker://${{ env.REGISTRY_DOCKERHUB }}/${image}:${tag}"
            done
          done

  sync-aliyun:
    needs: [prepare-release, track-start, merge-manifests]
    if: needs.merge-manifests.result == 'success'
    uses: ./.github/workflows/sync-aliyun.yaml
    with:
      build_scope: ${{ needs.prepare-release.outputs.build_scope }}
      edition: ee
      tags: "beta,${{ needs.build-push.outputs.sha }},${{ needs.prepare-release.outputs.release_id }}"
    secrets: inherit

  determine-status:
    needs: [track-start, build-push, merge-manifests, sync-dockerhub, sync-aliyun]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Determine final status
        id: status
        run: |
          if [ "${{ needs.build-push.result }}" == "success" ] && [ "${{ needs.merge-manifests.result }}" == "success" ] && [ "${{ needs.sync-dockerhub.result }}" == "success" ] && [ "${{ needs.sync-aliyun.result }}" == "success" ]; then
            echo "status=Released" >> $GITHUB_OUTPUT
          else
            echo "status=Fail" >> $GITHUB_OUTPUT
          fi

  track-complete:
    needs: [track-start, build-push, merge-manifests, sync-dockerhub, sync-aliyun, determine-status]
    if: always()
    uses: ./.github/workflows/track-build-teable.yaml
    with:
      action: update
      edition: ee
      record_id: ${{ needs.track-start.outputs.record_id }}
      status: ${{ needs.determine-status.outputs.status }}
      start_time: ${{ needs.track-start.outputs.start_time }}
    secrets:
      TEABLE_API_TOKEN: ${{ secrets.TEABLE_API_TOKEN }}
      PACKAGES_KEY: ${{ secrets.PACKAGES_KEY }}
