name: Bench app image build

# Side-effect-free timing run for the app image build: no tags are pushed
# (push: false), no syncs, no release tracking — only the registry build
# cache is read/written, using the same refs as build-teable-ee.yaml, so a
# bench run also pre-seeds the cache for real releases.
#
# Usage: run once with a cold cache for a baseline, then again (optionally
# with a different teable-ee ref / release label) to measure the cached path.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'teable-ee ref to build'
        required: false
        default: 'develop'
        type: string
      release_label:
        description: 'Fake release id baked into the build (vary it to force a fresh compile)'
        required: false
        default: 'bench'
        type: string

env:
  REGISTRY_GITHUB: ghcr.io/teableio

jobs:
  bench:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_key: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_key: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          token: ${{ secrets.PACKAGES_KEY }}
          ref: ${{ inputs.source_ref }}

      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Prepare generated Docker contexts
        run: node ./scripts/generate-docker-contexts.mjs

      - name: Free runner disk space for app build
        run: |
          set -euxo pipefail
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/share/dotnet \
            /usr/share/swift
          sudo apt-get clean
          sudo docker system prune -af --volumes || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/teable/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ENABLE_CSP=false
            NEXT_BUILD_ENV_EDITION=EE
            BUILD_VERSION=${{ inputs.release_label }}
            FRONTEND_RELEASE=${{ inputs.release_label }}
            GIT_COMMIT_SHA=bench
          push: false
          provenance: false
          cache-from: type=registry,ref=${{ env.REGISTRY_GITHUB }}/teable-buildcache:teable-${{ matrix.platform_key }}
          cache-to: type=registry,ref=${{ env.REGISTRY_GITHUB }}/teable-buildcache:teable-${{ matrix.platform_key }},mode=max,image-manifest=true,oci-mediatypes=true
