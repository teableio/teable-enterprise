name: Manual ECS Deploy (Verify)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., release.2026-04-20T10-38-57Z.1)'
        required: true
      trigger:
        description: 'Who triggered this deployment'
        required: false
        default: 'Manual'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        default: ''
      release_record_id:
        description: 'Cloud release record ID in Teable Releases table'
        required: false
        default: ''
      related_release_record_ids:
        description: 'Comma-separated Teable release record IDs to link on the launch record'
        required: false
        default: ''
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      trigger:
        description: 'Who triggered this deployment'
        required: false
        type: string
        default: 'Automation'
      release_created_time:
        description: 'Creation time of the release record that triggered this deploy (ISO 8601)'
        required: false
        type: string
        default: ''
      release_record_id:
        description: 'Cloud release record ID in Teable Releases table'
        required: false
        type: string
        default: ''
      related_release_record_ids:
        description: 'Comma-separated Teable release record IDs to link on the launch record'
        required: false
        type: string
        default: ''
    outputs:
      start_time:
        description: 'Deployment start timestamp'
        value: ${{ jobs.prepare.outputs.start_time }}
      image_tag:
        description: 'Deployed image tag'
        value: ${{ jobs.prepare.outputs.image_tag }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      PACKAGES_KEY:
        required: true
      TEABLE_API_TOKEN:
        required: false
      INFRA_TEABLE_AI_PREHEAT_TOKEN:
        required: false
      INFRA_TEABLE_CN_PREHEAT_TOKEN:
        required: false

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.start }}
      image_tag: ${{ inputs.image_tag }}

    steps:
      - name: Record start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

  # Production deploys run from the official release.<id> tag. A staging
  # build only carries its beta-<id> registry twin, so the FIRST launch of a
  # build stamps release.<id> from it (ghcr + ECR) before anything deploys —
  # the presence of a release.* tag is what makes a version official,
  # permanently retained, and exempt from beta cleanup / the ECR lifecycle
  # policy. Re-deploys of an already-released id (rollbacks) find the tag
  # present and skip, so they work even after the beta twin is reaped.
  stamp-release:
    name: Stamp official release tags
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stamp release tags from the staging build
        env:
          RELEASE_ID: ${{ inputs.image_tag }}
          ECR_REGISTRY: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable
        run: |
          set -euo pipefail
          BETA_TAG="beta-${RELEASE_ID#release.}"
          REGISTRIES=("ghcr.io/teableio" "$ECR_REGISTRY")
          IMAGES=("teable-cloud" "teable-sandbox-cloud")

          for REGISTRY in "${REGISTRIES[@]}"; do
            for IMAGE in "${IMAGES[@]}"; do
              if docker buildx imagetools inspect "$REGISTRY/${IMAGE}:${RELEASE_ID}" >/dev/null 2>&1; then
                echo "✅ ${IMAGE}:${RELEASE_ID} already stamped on ${REGISTRY}"
                continue
              fi
              docker buildx imagetools create \
                --tag "$REGISTRY/${IMAGE}:${RELEASE_ID}" \
                "$REGISTRY/${IMAGE}:${BETA_TAG}"
            done
          done

  deploy-sandbox:
    name: Deploy Sandbox to ECS
    needs: [prepare, stamp-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download sandbox task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable-sandbox \
            --query taskDefinition > sandbox-task-definition-raw.json

      - name: Clean sandbox task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            sandbox-task-definition-raw.json > sandbox-task-definition.json

      - name: Render sandbox task definition with new image
        id: render-sandbox-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: sandbox-task-definition.json
          container-name: teable-sandbox
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-sandbox-cloud:${{ inputs.image_tag }}

      - name: Deploy sandbox to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-sandbox-task-def.outputs.task-definition }}
          service: teable-sandbox
          cluster: teable
          wait-for-service-stability: true

  deploy-app:
    name: Deploy Main to ECS
    # stamp-release must have produced the release.<id> tag before the
    # migration one-off task or the service tries to pull it.
    needs: [prepare, stamp-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition teable \
            --query taskDefinition > task-definition-raw.json

      - name: Clean task definition for registration
        run: |
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection, .faultInjectionPolicy)' \
            task-definition-raw.json > task-definition.json

      - name: Validate computed outbox requirements
        run: |
          if ! jq -e '
            .containerDefinitions[]
            | select(.name == "teable")
            | [
                ((.environment // [])[] | select(.name == "BACKEND_CACHE_REDIS_URI") | .value),
                ((.secrets // [])[] | select(.name == "BACKEND_CACHE_REDIS_URI") | .valueFrom)
              ]
            | first
            | select(type == "string" and length > 0)
            | select(test("(^|@|//)(127\\.0\\.0\\.1|localhost|0\\.0\\.0\\.0|\\[?::1\\]?)(:|/)") | not)
          ' task-definition.json > /dev/null; then
            echo "::error::BullMQ computed outbox requires a shared, non-loopback BACKEND_CACHE_REDIS_URI"
            exit 1
          fi

          if jq -e '
            .containerDefinitions[]
            | select(.name == "teable")
            | (.environment // [])[]
            | select(.name == "V2_COMPUTED_UPDATE_MODE" and (.value | ascii_downcase) == "sync")
          ' task-definition.json > /dev/null; then
            echo "::error::Remove V2_COMPUTED_UPDATE_MODE=sync before enabling BullMQ computed outbox"
            exit 1
          fi

      - name: Render task definition with new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: teable
          image: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable/teable-cloud:${{ inputs.image_tag }}

      - name: Run database migration as one-off task
        run: |
          # Get network config from the service for RunTask
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster teable \
            --services teable-service-1 \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Register a temporary task definition with the new image for migration
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migration with task definition: $TASK_DEF_ARN"

          # Run migration as a one-off task with command override
          TASK_ARN=$(aws ecs run-task \
            --cluster teable \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "teable",
                "command": ["migrate-only"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task started: $TASK_ARN"

          # Wait for migration task to complete
          echo "Waiting for migration to complete..."
          aws ecs wait tasks-stopped --cluster teable --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster teable \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`teable`].exitCode | [0]' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            # Print migration task logs for debugging
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /ecs/teable \
              --log-stream-name "ecs/teable/$TASK_ID" \
              --limit 50 \
              --query 'events[*].message' \
              --output text 2>/dev/null || true
            exit 1
          fi

          echo "Database migration completed successfully"

      - name: Update task definition with skip-migrate command
        run: |
          # Add skip-migrate command to the main container and remove the db-migrate init container if present
          jq '(.containerDefinitions[] | select(.name == "teable")).command = ["skip-migrate"]
              | .containerDefinitions = [.containerDefinitions[] | select(.name != "db-migrate")]
              | (.containerDefinitions[] | select(.name == "teable")) |= del(.dependsOn)' \
            "${{ steps.render-task-def.outputs.task-definition }}" > task-definition-skip-migrate.json

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition-skip-migrate.json
          service: teable-service-1
          cluster: teable
          wait-for-service-stability: true

      - name: Ensure BYODB migration worker ECS service
        env:
          AWS_REGION: us-west-2
          ECS_CLUSTER: teable
          APP_SERVICE: teable-service-1
          APP_CONTAINER: teable
          APP_TASK_DEFINITION_FILE: task-definition-skip-migrate.json
          WORKER_TASK_FAMILY: teable-byodb-migration-worker
          WORKER_SERVICE: teable-byodb-migration-worker
          WORKER_OTEL_SERVICE_NAME: teable-ai-byodb-migration-worker
        run: .github/scripts/ensure-byodb-migration-worker-ecs.sh

  promote-latest:
    name: Promote Release Tag to Latest
    needs: [prepare, deploy-sandbox, deploy-app]
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote release tag to latest
        env:
          RELEASE_ID: ${{ inputs.image_tag }}
          ECR_REGISTRY: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable
        run: |
          REGISTRIES=("ghcr.io/teableio" "$ECR_REGISTRY")
          IMAGES=("teable-cloud" "teable-sandbox-cloud")

          for REGISTRY in "${REGISTRIES[@]}"; do
            for IMAGE in "${IMAGES[@]}"; do
              docker buildx imagetools create \
                --tag "$REGISTRY/${IMAGE}:latest" \
                "$REGISTRY/${IMAGE}:${RELEASE_ID}"
            done
          done

  # Aliyun receives images ONLY at release time. The official release.<id>
  # must ship alongside latest: teable.cn (manual-sealos-deploy) deploys
  # that pinned tag from Aliyun, and the sync's cloud lane also carries the
  # canonical agent tag that CN sandboxes pull.
  sync-aliyun:
    needs: [stamp-release, promote-latest]
    if: needs.promote-latest.result == 'success'
    uses: ./.github/workflows/sync-aliyun.yaml
    with:
      edition: cloud
      tags: "latest,${{ inputs.image_tag }}"
    secrets: inherit

  # Preheat CN sandbox-agent nodes as soon as the agent tag lands on Aliyun.
  # Best-effort: not part of the notify gating — a preheat miss only costs
  # first-spawn latency.
  preheat-sandbox-agent:
    needs: sync-aliyun
    if: needs.sync-aliyun.result == 'success'
    uses: ./.github/workflows/preheat-sandbox-agent-cloud.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit

  # With the release stamped and deployed, the accumulated cloud staging
  # versions have served their purpose: reap beta-* keeping a small cushion
  # for staging rollback. The launched version itself only loses its beta-
  # tag — the image survives, now carrying release.<id>. PACKAGES_KEY has
  # the needed scopes (delete:packages + write:packages, probed
  # 2026-07-18). Shares the ghcr-gc concurrency group: the cleanup action
  # must never run twice against the same package.
  cleanup-beta:
    name: Reap cloud staging versions
    needs: [deploy-sandbox, deploy-app, promote-latest]
    if: needs.deploy-sandbox.result == 'success' && needs.deploy-app.result == 'success'
    concurrency:
      group: ghcr-gc
    runs-on: ubuntu-latest
    steps:
      - name: Delete old beta versions of the cloud packages
        uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          token: ${{ secrets.PACKAGES_KEY }}
          owner: teableio
          packages: teable-cloud,teable-sandbox-cloud
          delete-tags: beta-*
          keep-n-tagged: 5
          exclude-tags: latest,release.*
          validate: true

  notify:
    name: Record Deployment in Teable
    needs: [prepare, deploy-sandbox, deploy-app, promote-latest, sync-aliyun]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Record deployment in Teable
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          TRIGGER: ${{ inputs.trigger || github.actor }}
          RELEASE_CREATED_TIME: ${{ inputs.release_created_time }}
          RELEASE_RECORD_ID: ${{ inputs.release_record_id }}
          RELATED_RELEASE_RECORD_IDS: ${{ inputs.related_release_record_ids }}
        run: |
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          related_release_ids_json=$(printf '%s' "$RELATED_RELEASE_RECORD_IDS" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')

          # Build JSON payload using jq to properly escape special characters
          payload=$(jq -n \
            --arg date "$current_time" \
            --arg region "teable.ai" \
            --arg trigger "$TRIGGER" \
            --arg snapshot "$RELEASE_CREATED_TIME" \
            --argjson relatedReleaseIds "$related_release_ids_json" \
            '{
              "fieldKeyType": "dbFieldName",
              "typecast": true,
              "records": [
                {
                  "fields": {
                    "date": $date,
                    "region": $region,
                    "trigger": $trigger,
                    "Deploy_snapshot_time": (if $snapshot != "" then $snapshot else null end),
                    "Related_Releases": (if ($relatedReleaseIds | length) > 0 then $relatedReleaseIds else null end)
                  }
                }
              ]
            }')

          # Make the API call and capture both response and HTTP status code
          http_code=$(curl -s -w "%{http_code}" -o /tmp/response.json -X POST 'https://app.teable.ai/api/table/tblmGAFOHrGcy66PaUp/record' \
            -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d "$payload")

          response=$(cat /tmp/response.json)
          echo "Response: $response"
          echo "HTTP Status Code: $http_code"

          # Check if request was successful
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            record_id=$(echo "$response" | jq -r '.records[0].id')
            echo "Created deployment record with ID: ${record_id}"

            if [ -n "$RELEASE_RECORD_ID" ]; then
              update_payload=$(jq -n \
                '{
                  "fieldKeyType": "dbFieldName",
                  "typecast": true,
                  "record": {
                    "fields": {
                      "status": "Launched"
                    }
                  }
                }')

              update_http_code=$(curl -s -w "%{http_code}" -o /tmp/release-update.json -X PATCH \
                "https://app.teable.ai/api/table/tblAhVLOxNtvkaF1ii5/record/${RELEASE_RECORD_ID}" \
                -H 'Authorization: Bearer ${{ secrets.TEABLE_API_TOKEN }}' \
                -H 'Content-Type: application/json' \
                -d "$update_payload")

              echo "Updated release record ${RELEASE_RECORD_ID} to Launched: HTTP ${update_http_code}"
            fi
          else
            echo "Error: API request failed with status code $http_code"
            echo "Response: $response"
            exit 1
          fi
