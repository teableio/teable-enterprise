name: Sync images to Aliyun

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to sync (cloud or ee)'
        required: true
        type: choice
        options:
          - cloud
          - ee
      tags:
        description: 'Comma-separated tags to sync (e.g., latest,abc123,1.0.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      edition:
        required: true
        type: string
      tags:
        required: true
        type: string
    secrets:
      PACKAGES_KEY:
        required: true
      ALI_DOCKER_PASSWORD:
        required: true

env:
  SRC_REGISTRY: ghcr.io/teableio
  DST_REGISTRY: registry.cn-shenzhen.aliyuncs.com/teable
  MAX_RETRIES: 5
  RETRY_DELAY: 30

jobs:
  sync:
    name: Sync ${{ inputs.edition }} images
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Sync images to Aliyun
        env:
          SRC_CREDS: ${{ github.actor }}:${{ secrets.PACKAGES_KEY }}
          DST_CREDS: ${{ vars.ALI_DOCKER_USERNAME }}:${{ secrets.ALI_DOCKER_PASSWORD }}
        run: |
          set +e

          retry_copy() {
            local src="$1" dst="$2" all_flag="$3"
            for attempt in $(seq 1 $MAX_RETRIES); do
              echo "[$attempt/$MAX_RETRIES] Copying ${src} -> ${dst}"
              if skopeo copy ${all_flag} \
                  "docker://${src}" "docker://${dst}" \
                  --src-creds="${SRC_CREDS}" \
                  --dest-creds="${DST_CREDS}"; then
                echo "✅ Success: ${src}"
                return 0
              fi
              echo "⚠️ Attempt ${attempt} failed. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            done
            echo "❌ FAILED after ${MAX_RETRIES} attempts: ${src}"
            return 1
          }

          IFS=',' read -ra TAGS <<< "${{ inputs.tags }}"
          FAILED=0

          if [ "${{ inputs.edition }}" = "cloud" ]; then
            # The cloud app images are multi-arch on ghcr, but arm64 ships
            # from ghcr ONLY — Aliyun (like ECR) stays amd64-only, byte-
            # identical to the pre-multi-arch behavior.
            IMAGES=("teable-cloud" "teable-sandbox-cloud")
            for image in "${IMAGES[@]}"; do
              for tag in "${TAGS[@]}"; do
                [ -n "$tag" ] || continue
                retry_copy \
                  "${SRC_REGISTRY}/${image}:${tag}" \
                  "${DST_REGISTRY}/${image}:${tag}" \
                  "--override-arch amd64 --override-os linux" \
                  || FAILED=1
              done
            done

            # The agent is built by the ee lane under its single canonical name
            # (no -cloud alias), but it is synced in BOTH lanes so a manual
            # cloud-only resync still refreshes the CN agent tag. skopeo copy
            # is idempotent, so the double sync on the normal path is harmless.
            # "latest" is skipped: the agent publishes no latest tag (its only
            # consumers pull prefix + explicit app build tag).
            for tag in "${TAGS[@]}"; do
              [ -n "$tag" ] || continue
              [ "$tag" = "latest" ] && continue
              retry_copy \
                "${SRC_REGISTRY}/teable-sandbox-agent:${tag}" \
                "${DST_REGISTRY}/teable-sandbox-agent:${tag}" \
                "--all" \
                || FAILED=1
            done
          elif [ "${{ inputs.edition }}" = "ee" ]; then
            IMAGES=("teable" "teable-sandbox")
            SUFFIXES=("" "-ee")

            for image in "${IMAGES[@]}"; do
              for suffix in "${SUFFIXES[@]}"; do
                for tag in "${TAGS[@]}"; do
                  [ -n "$tag" ] || continue
                  retry_copy \
                    "${SRC_REGISTRY}/${image}${suffix}:${tag}" \
                    "${DST_REGISTRY}/${image}${suffix}:${tag}" \
                    "--all" \
                    || FAILED=1
                done
              done
            done

            # Single canonical sandbox agent (no -ee/-cloud alias); both
            # teable.ai and teable.cn preheat teable/teable-sandbox-agent.
            # "latest" is skipped: the agent publishes no latest tag (its only
            # consumers pull prefix + explicit app build tag). Same rule as the
            # cloud lane above; without it every ee latest-promotion sync fails.
            for tag in "${TAGS[@]}"; do
              [ -n "$tag" ] || continue
              [ "$tag" = "latest" ] && continue
              retry_copy \
                "${SRC_REGISTRY}/teable-sandbox-agent:${tag}" \
                "${DST_REGISTRY}/teable-sandbox-agent:${tag}" \
                "--all" \
                || FAILED=1
            done
          fi

          if [ $FAILED -ne 0 ]; then
            echo "::error::Some images failed to sync to Aliyun"
            exit 1
          fi
          echo "🎉 All images synced successfully"
