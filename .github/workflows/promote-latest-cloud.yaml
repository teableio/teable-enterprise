name: Promote teable cloud to latest

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Existing build-time release id to promote'
        required: true
        type: string
  repository_dispatch:
    types: [promote-cloud]

jobs:
  promote-latest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [app, sandbox]
        include:
          - target: app
            image: teable-cloud
          - target: sandbox
            image: teable-sandbox-cloud

    steps:
      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote release tag to latest
        env:
          RELEASE_ID: ${{ github.event.client_payload.release_id || inputs.release_id }}
          ECR_REGISTRY: 649941507946.dkr.ecr.us-west-2.amazonaws.com/teable
        run: |
          REGISTRIES=("ghcr.io/teableio" "$ECR_REGISTRY")

          for REGISTRY in "${REGISTRIES[@]}"; do
            docker buildx imagetools create \
              --tag "$REGISTRY/${{ matrix.image }}:latest" \
              "$REGISTRY/${{ matrix.image }}:${RELEASE_ID}"
          done

  sync-aliyun:
    needs: promote-latest
    if: needs.promote-latest.result == 'success'
    uses: ./.github/workflows/sync-aliyun.yaml
    with:
      edition: cloud
      tags: "latest"
    secrets: inherit
