# EE Remote CI — integration suite (mirrors teable-ee "Integration Tests").
#
# Architecture: teable-ee suites run on this public repo's free 4c16G runners.
# teable-ee's dispatch job (or the rerun worker) creates a check run per suite
# and fires one repository_dispatch per suite; the verdict job here concludes
# that check run through the teable-remote-ci App with per-shard durations and
# failure tails, then triggers the private full-log render on teable-ee.
#
# Privacy contract: teable-ee is private, this repo is public — suite output
# is redirected into log files (public logs carry exit codes only) and ships
# to the private teable-ci-logs repo as release assets.
#
# SOURCE OF TRUTH lives in teable-ee .github/enterprise-ci/ and is synced by
# sync-ci-to-enterprise.yml — never edit the copies here.

name: EE Remote CI (integration)

run-name: 'EE Remote CI integration — PR #${{ github.event.client_payload.pr_number }} ${{ github.event.client_payload.log_tag }}'

on:
  repository_dispatch:
    types: [ee-remote-ci-integration]

concurrency:
  group: ee-remote-ci-integration-${{ github.event.client_payload.pr_number || github.event.client_payload.ee_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  EE_SHA: ${{ github.event.client_payload.ee_sha }}
  LOG_TAG: ${{ github.event.client_payload.log_tag }}
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  LOG_DIR: /tmp/ci-logs
  LOGS_REPO: teableio/teable-ci-logs

jobs:
  integration:
    runs-on: ubuntu-latest
    name: Integration Tests - ${{ matrix.e2e.database-type }} ${{ matrix.e2e.shard }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        e2e:
          - database-type: postgres-ee
            shard: 1/2
          - database-type: postgres-ee
            shard: 2/2
          - database-type: postgres-community
            shard: 1/4
          - database-type: postgres-community
            shard: 2/4
          - database-type: postgres-community
            shard: 3/4
          - database-type: postgres-community
            shard: 4/4
          - database-type: postgres-community-unit
            shard: 1/2
          - database-type: postgres-community-unit
            shard: 2/2
          - database-type: postgres-community-split
            shard: smoke

    env:
      CI: 1
      TEABLE_TSDOWN_DISABLE_DTS: '1'

    steps:
      - name: 📦 Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false

      - name: 🟢 Use Node.js 22.22.3
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      # prisma generate costs ~40s per schema; the generated clients only change
      # with the schemas or the prisma version, so cache them across runs.
      - name: ♻️ Restore generated prisma clients
        id: prisma-clients
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.pnpm/@prisma+client@*/node_modules/.prisma
            community/packages/db-data-prisma/src/generated
          key: prisma-clients-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'packages/db-main-prisma/prisma/postgres/schema.prisma', 'community/packages/db-data-prisma/prisma/schema.prisma') }}

      - name: 🧪 Run Tests
        env:
          VITEST_MAX_THREADS: 2
          VITEST_MIN_THREADS: 1
          VITEST_SHARD: ${{ matrix.e2e.shard }}
          # Listener-level probes ([e2e-probe] lines) for diagnosing event-chain flakes.
          E2E_PROBE: 1
          # Airtable import e2e (test/airtable-import.e2e-spec.ts) — skips when unset.
          # PAT is a Secret (read-only, scoped to the single test base); base id is a Variable.
          AIRTABLE_TEST_PAT: ${{ secrets.AIRTABLE_TEST_PAT }}
          AIRTABLE_TEST_BASE: ${{ vars.AIRTABLE_TEST_BASE }}
          PRISMA_CLIENTS_CACHED: ${{ steps.prisma-clients.outputs.cache-hit }}
        run: |
          mkdir -p "$LOG_DIR"
          SLUG="${{ matrix.e2e.database-type }}-$(echo '${{ matrix.e2e.shard }}' | tr '/' '-')"
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          status=0
          {
            echo "=== make ${{ matrix.e2e.database-type }}.integration.test (shard ${{ matrix.e2e.shard }}) ==="
            make ${{ matrix.e2e.database-type }}.integration.test
          } >> "$LOG_DIR/integration-$SLUG.log" 2>&1 || status=$?
          echo "integration exit=$status ($(wc -l < "$LOG_DIR/integration-$SLUG.log") log lines)"
          exit $status

      - name: 📤 Ship log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p "$LOG_DIR"
          SLUG="${SLUG:-${{ matrix.e2e.database-type }}-$(echo '${{ matrix.e2e.shard }}' | tr '/' '-')}"
          [ -f "$LOG_DIR/integration-$SLUG.log" ] || echo "(no log produced — job failed before its first logged step)" > "$LOG_DIR/integration-$SLUG.log"
          gh release create "$LOG_TAG" -R "$LOGS_REPO" --title "EE Remote CI $LOG_TAG (PR #$PR_NUMBER)" --notes "ee_sha=$EE_SHA run=$RUN_URL" 2>/dev/null || true
          gh release upload "$LOG_TAG" "$LOG_DIR/integration-$SLUG.log" -R "$LOGS_REPO" --clobber
          # Failure marker — the conclude step tails only marked logs instead
          # of guessing from log text (which false-positived on ERROR noise).
          if [ "$JOB_STATUS" != "success" ]; then
            echo failed > "$LOG_DIR/integration-$SLUG.failed"
            gh release upload "$LOG_TAG" "$LOG_DIR/integration-$SLUG.failed" -R "$LOGS_REPO" --clobber
          fi

  verdict:
    needs: [integration]
    if: always()
    runs-on: ubuntu-latest
    name: Integration verdict
    timeout-minutes: 5
    steps:
      - name: 📦 Checkout teable-ee (.github only)
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ github.event.client_payload.ee_checkout_sha || github.event.client_payload.ee_sha }}
          token: ${{ secrets.PACKAGES_KEY }}
          persist-credentials: false
          sparse-checkout: |
            .github

      - name: 🎫 Mint App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RCI_APP_ID }}
          private-key: ${{ secrets.RCI_APP_PRIVATE_KEY }}
          owner: teableio
          repositories: teable-ee

      - name: 🧾 Conclude check run
        uses: ./.github/actions/remote-ci-conclude
        with:
          suite: integration
          results: 'matrix=${{ needs.integration.result }}'
          app-token: ${{ steps.app.outputs.token }}
          logs-token: ${{ secrets.PACKAGES_KEY }}

      - name: 📨 Dispatch ee-remote-ci-done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_KEY }}
        run: |
          gh api repos/teableio/teable-ee/dispatches \
            -f event_type=ee-remote-ci-done \
            -f "client_payload[suite]=integration" \
            -f "client_payload[pr_number]=${PR_NUMBER}" \
            -f "client_payload[ee_sha]=${EE_SHA}" \
            -f "client_payload[log_tag]=${LOG_TAG}" \
            -f "client_payload[remote_run_url]=${RUN_URL}" \
            -f "client_payload[check_run_id]=${{ github.event.client_payload.check_run_id }}" \
            -f "client_payload[results]=matrix=${{ needs.integration.result }}"
